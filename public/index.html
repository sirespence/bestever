<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATOM | Ultimate Proxy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- COSMIC VARIABLES --- */
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --core-white: #ffffff;
            --glass-bg: rgba(10, 20, 40, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gloss-gradient: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 51%, rgba(255,255,255,0.05) 100%);
            --font-space: 'Segoe UI', 'Roboto', sans-serif;
        }

        /* --- UNIVERSE RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-space); }

        body {
            height: 100vh;
            overflow: hidden;
            background: #020408; /* Deep Space Black */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
        }

        /* --- INTERACTIVE BACKGROUND CANVAS --- */
        #cosmos-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 50% 50%, #0d1a33 0%, #000000 100%);
        }

        /* --- MAIN INTERFACE --- */
        .interface-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            perspective: 1000px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255,255,255,0.3);
            box-shadow: 
                0 0 50px rgba(0, 243, 255, 0.1),
                0 20px 40px rgba(0,0,0,0.6),
                inset 0 0 0 1px rgba(255,255,255,0.05);
            padding: 50px;
            text-align: center;
            transform-style: preserve-3d;
            animation: floatHud 6s ease-in-out infinite;
        }

        /* --- 3D ATOM LOGO --- */
        .atom-visual {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 20px;
            transform-style: preserve-3d;
        }

        /* The Nucleus */
        .nucleus {
            position: absolute; top: 50%; left: 50%;
            width: 30px; height: 30px;
            background: radial-gradient(circle at 30% 30%, #fff, var(--neon-blue));
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px var(--neon-blue);
            z-index: 10;
        }

        /* Electron Orbits */
        .orbit {
            position: absolute; top: 50%; left: 50%;
            width: 100%; height: 100%;
            border: 2px solid rgba(0, 243, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        
        .orbit:nth-child(1) { animation: spin1 4s linear infinite; }
        .orbit:nth-child(2) { animation: spin2 5s linear infinite; width: 80%; height: 80%; border-color: rgba(188, 19, 254, 0.6); }
        .orbit:nth-child(3) { animation: spin3 6s linear infinite; width: 120%; height: 120%; border-color: rgba(255, 255, 255, 0.4); }

        /* Electrons */
        .orbit::before {
            content: ''; position: absolute; top: -4px; left: 50%;
            width: 8px; height: 8px; background: white; border-radius: 50%;
            box-shadow: 0 0 10px white;
        }

        h1 {
            font-size: 50px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }
        h1 b { font-weight: 800; color: var(--neon-blue); }

        .tagline {
            color: #aaa; font-size: 14px; letter-spacing: 1px; margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* --- SEARCH INPUT --- */
        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .search-input {
            width: 100%;
            padding: 18px 60px 18px 25px;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        .search-input:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.7);
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.2), inset 0 2px 5px rgba(0,0,0,0.5);
            transform: scale(1.02);
        }

        .search-btn {
            position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
            width: 46px; height: 46px;
            border-radius: 50%; border: none;
            background: linear-gradient(180deg, var(--neon-blue), #0078d7);
            color: white; font-size: 18px; cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            transition: 0.3s;
        }
        .search-btn:hover { filter: brightness(1.2); transform: translateY(-50%) rotate(90deg); }

        /* --- HOLOGRAPHIC GRID --- */
        .app-grid {
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
        }

        .app-card {
            width: 80px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .icon-sphere {
            width: 60px; height: 60px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
            transition: 0.3s;
        }

        .icon-sphere::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
            opacity: 0.3; border-radius: 50% 50% 0 0;
        }

        .app-card:hover .icon-sphere {
            transform: translateY(-5px) scale(1.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px var(--neon-blue);
            background: rgba(0, 243, 255, 0.1);
        }

        .app-name { font-size: 12px; opacity: 0.7; font-weight: 600; text-shadow: 0 2px 4px black; }

        /* --- KEYFRAMES --- */
        @keyframes floatHud { 0%,100%{transform:translateY(0) rotateX(0);} 50%{transform:translateY(-10px) rotateX(1deg);} }
        @keyframes spin1 { 0%{transform:translate(-50%,-50%) rotateX(70deg) rotateZ(0deg);} 100%{transform:translate(-50%,-50%) rotateX(70deg) rotateZ(360deg);} }
        @keyframes spin2 { 0%{transform:translate(-50%,-50%) rotateX(-60deg) rotateZ(0deg);} 100%{transform:translate(-50%,-50%) rotateX(-60deg) rotateZ(360deg);} }
        @keyframes spin3 { 0%{transform:translate(-50%,-50%) rotateY(80deg) rotateZ(0deg);} 100%{transform:translate(-50%,-50%) rotateY(80deg) rotateZ(360deg);} }

        /* Specific Colors */
        .fa-youtube { color: #ff5555; }
        .fa-discord { color: #5865F2; }
        .fa-gamepad { color: #bc13fe; }
        .fa-tiktok { color: white; text-shadow: 2px 2px 0 #ff0050, -2px -2px 0 #00f2ea; }

    </style>
</head>
<body>

    <!-- 1. DYNAMIC BACKGROUND CANVAS -->
    <canvas id="cosmos-canvas"></canvas>

    <!-- 2. MAIN UI -->
    <div class="interface-container">
        <div class="glass-panel">
            
            <!-- 3D Logo -->
            <div class="atom-visual">
                <div class="nucleus"></div>
                <div class="orbit"></div>
                <div class="orbit"></div>
                <div class="orbit"></div>
            </div>

            <h1>ATOM <b>OS</b></h1>
            <div class="tagline">Molecular Web Gateway</div>

            <!-- Search Form -->
            <form id="proxy-form" class="search-wrapper">
                <input type="text" class="search-input" id="uv-address" placeholder="Search the Cosmos or type a URL..." autocomplete="off">
                <button type="submit" class="search-btn">
                    <i class="fa-solid fa-atom"></i>
                </button>
            </form>

            <!-- App Grid (Replaced now.gg with CrazyGames) -->
            <div class="app-grid">
                <div class="app-card" onclick="launch('https://discord.com')">
                    <div class="icon-sphere"><i class="fa-brands fa-discord"></i></div>
                    <span class="app-name">Discord</span>
                </div>
                <div class="app-card" onclick="launch('https://youtube.com')">
                    <div class="icon-sphere"><i class="fa-brands fa-youtube"></i></div>
                    <span class="app-name">YouTube</span>
                </div>
                <div class="app-card" onclick="launch('https://crazygames.com')">
                    <div class="icon-sphere"><i class="fa-solid fa-gamepad"></i></div>
                    <span class="app-name">CrazyGames</span>
                </div>
                <div class="app-card" onclick="launch('https://tiktok.com')">
                    <div class="icon-sphere"><i class="fa-brands fa-tiktok"></i></div>
                    <span class="app-name">TikTok</span>
                </div>
                <div class="app-card" onclick="launch('https://reddit.com')">
                    <div class="icon-sphere"><i class="fa-brands fa-reddit-alien"></i></div>
                    <span class="app-name">Reddit</span>
                </div>
            </div>

        </div>
    </div>

    <!-- 
       === ULTRAVIOLET / VERCEL CONFIGURATION === 
       Ensure your project has the 'public/uv' folder with uv.bundle.js, uv.config.js, etc.
    -->
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>

    <script>
        // --- 1. COSMIC BACKGROUND ANIMATION ---
        const canvas = document.getElementById('cosmos-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        // Resize Canvas
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Particle Class (Atoms/Stars)
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5; // Slow movement
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 0.5;
                this.color = Math.random() > 0.9 ? '#00f3ff' : '#ffffff'; // Occasional blue atoms
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Wrap around screen
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        // Initialize Particles
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }

        // Animation Loop
        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Update and draw particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Draw "Molecular Bonds" (Lines between close particles)
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 100) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 243, 255, ${1 - distance / 100})`; // Fade out line
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }
        animate();


        // --- 2. PROXY LOGIC (ULTRAVIOLET) ---
        const form = document.getElementById('proxy-form');
        const input = document.getElementById('uv-address');

        async function registerSW() {
            if (!navigator.serviceWorker) throw new Error("Service Worker not supported.");
            await navigator.serviceWorker.register('/uv/sw.js', { scope: __uv$config.prefix });
        }

        async function launch(url) {
            // UI Feedback
            input.value = "Establishing Molecular Link...";
            
            // Check for UV
            if (typeof Ultraviolet === 'undefined') {
                console.warn("UV scripts missing. Redirecting normally for demo.");
                window.location.href = url;
                return;
            }

            try {
                await registerSW();
            } catch (err) {
                console.error("SW Registration Failed", err);
            }

            let processedUrl = url.trim();
            if (!isUrl(processedUrl)) processedUrl = 'https://www.google.com/search?q=' + processedUrl;
            else if (!(processedUrl.startsWith('http://') || processedUrl.startsWith('https://'))) processedUrl = 'http://' + processedUrl;

            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(processedUrl);
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            await launch(input.value);
        });

        function isUrl(val = '') {
            return /^http(s?):\/\//.test(val) || (val.includes('.') && val.substr(0, 1) !== ' ');
        }
    </script>
</body>
</html>
