<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATOM | stargazing ⚛️</title>
    
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js", {
                    scope: __uv$config.prefix,
                });
            });
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #7000ff;
            --secondary: #00ffff;
            --accent: #ff00ff;
            --bg: #050208;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #1a0b2e 0%, var(--bg) 100%);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* top nav / tabs */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 40px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(112, 0, 255, 0.3);
            z-index: 100;
        }

        .logo { font-family: 'Syncopate'; font-size: 1.5rem; color: var(--secondary); letter-spacing: 5px; }

        .nav-links { display: flex; gap: 30px; }
        .nav-item {
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            color: #888;
            font-weight: 900;
        }
        .nav-item:hover, .nav-item.active { color: var(--secondary); text-shadow: 0 0 10px var(--secondary); }

        /* content areas */
        .page { display: none; flex-direction: column; align-items: center; height: 100%; padding: 40px; overflow-y: auto; }
        .page.active { display: flex; }

        /* search bar */
        .search-container {
            width: 100%;
            max-width: 700px;
            display: flex;
            background: var(--glass);
            border-radius: 50px;
            padding: 8px;
            border: 1px solid var(--primary);
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            padding: 10px 20px;
            font-family: 'Orbitron';
        }

        button#launch {
            background: var(--primary);
            border: none;
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            transition: 0.3s;
        }

        button#launch:hover { background: var(--accent); transform: scale(1.05); }

        /* game grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .game-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(112, 0, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .game-card:hover {
            background: rgba(112, 0, 255, 0.1);
            border-color: var(--secondary);
            transform: translateY(-5px);
        }

        .game-card img { width: 60px; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--secondary)); }
        .game-card h3 { margin: 10px 0 5px; font-size: 1rem; color: var(--secondary); }
        .game-card p { font-size: 0.7rem; color: #888; margin: 0; }

        /* iframe viewport */
        .viewport-container {
            width: 100%;
            height: 100%;
            display: none; /* hidden until a site is loaded */
            background: #000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .back-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 900;
            z-index: 200;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ATOM</div>
        <div class="nav-links">
            <div class="nav-item active" onclick="showPage('home')">Home</div>
            <div class="nav-item" onclick="showPage('arcade')">Arcade</div>
            <div class="nav-item" onclick="showPage('settings')">Settings</div>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="search-container">
            <input type="text" id="urlInput" placeholder="explore the multiverse...">
            <button id="launch">GO</button>
        </div>
        <p style="color: #555; font-size: 0.8rem;">tip: enter a URL or just type something to search brave.</p>
    </div>

    <div id="arcade" class="page">
        <h1 style="font-family: 'Syncopate'; font-size: 1.2rem; margin-bottom: 30px;">THE NEBULA ARCADE</h1>
        <div class="game-grid">
            <div class="game-card" onclick="processUrl('https://www.roblox.com')">
                <div style="font-size: 40px;">🟥</div>
                <h3>ROBLOX</h3>
                <p>now.gg / web version</p>
            </div>
            <div class="game-card" onclick="processUrl('https://supermario-game.com/')">
                <div style="font-size: 40px;">🍄</div>
                <h3>MARIO</h3>
                <p>super mario bros classic</p>
            </div>
            <div class="game-card" onclick="processUrl('https://www.google.com/logos/2010/pacman10-i.html')">
                <div style="font-size: 40px;">🟡</div>
                <h3>PAC-MAN</h3>
                <p>classic arcade</p>
            </div>
            <div class="game-card" onclick="processUrl('https://sonic-js.com/')">
                <div style="font-size: 40px;">🦔</div>
                <h3>SONIC</h3>
                <p>blue blur action</p>
            </div>
            <div class="game-card" onclick="processUrl('https://poki.com')">
                <div style="font-size: 40px;">🎮</div>
                <h3>POKI</h3>
                <p>1000+ web games</p>
            </div>
        </div>
    </div>

    <div id="viewport" class="viewport-container">
        <iframe id="uvFrame"></iframe>
        <div class="back-btn" onclick="closeViewport()">EXIT VIEWPORT</div>
    </div>

    <script>
        const input = document.getElementById('urlInput');
        const btn = document.getElementById('launch');
        const frame = document.getElementById('uvFrame');
        const viewport = document.getElementById('viewport');

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            viewport.style.display = 'none';
        }

        function processUrl(val) {
            let url = val.trim();
            if (!url.includes('.')) {
                url = 'https://search.brave.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            
            // let's goooo
            frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
            
            // hide everything and show the frame
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            viewport.style.display = 'block';
        }

        btn.onclick = () => processUrl(input.value);
        
        input.onkeydown = (e) => {
            if (e.key === 'Enter') btn.click();
        };

        function closeViewport() {
            frame.src = "about:blank";
            viewport.style.display = 'none';
            document.getElementById('home').classList.add('active');
        }
    </script>
</body>
</html>
