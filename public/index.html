<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATOM | Galaxy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- FRUTIGER GALAXY AESTHETICS --- */
        :root {
            --space-bg: #030610;
            --glass-panel: rgba(20, 25, 45, 0.75);
            --glass-border: rgba(255, 255, 255, 0.12);
            --neon-cyan: #00f3ff;
            --neon-pink: #bc13fe;
            --neon-green: #00ff9d;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --font-stack: 'Segoe UI', 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-stack); outline: none; user-select: none; }

        body {
            background-color: var(--space-bg);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(188, 19, 254, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.15), transparent 25%),
                url('https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
            display: flex;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 250px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
            padding: 20px;
            z-index: 20;
        }

        .brand {
            font-size: 24px; font-weight: 200; letter-spacing: 2px;
            margin-bottom: 40px; display: flex; align-items: center; gap: 10px;
        }
        .brand i { color: var(--neon-cyan); font-size: 28px; animation: spin 10s linear infinite; }
        .brand b { font-weight: 700; color: white; }

        .nav-item {
            padding: 12px 15px; margin-bottom: 5px;
            border-radius: 10px; cursor: pointer;
            color: var(--text-dim); transition: 0.2s;
            display: flex; align-items: center; gap: 12px;
            font-size: 14px; font-weight: 500;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .nav-item.active { border-left: 3px solid var(--neon-cyan); }
        .nav-item i { width: 20px; text-align: center; }

        .panic-btn {
            margin-top: auto;
            background: rgba(255, 50, 50, 0.2);
            color: #ff5555;
            border: 1px solid rgba(255, 50, 50, 0.3);
        }
        .panic-btn:hover { background: #ff5555; color: white; }

        /* --- MAIN CONTENT --- */
        .main-view {
            flex: 1; display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            height: 80px; padding: 0 40px;
            display: flex; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .search-container {
            position: relative; width: 100%; max-width: 600px;
        }
        .search-input {
            width: 100%; padding: 12px 50px 12px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px; color: white;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .search-input:focus {
            background: rgba(255,255,255,0.15);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #aaa; }

        /* Scrollable Grid Area */
        .content-scroll {
            flex: 1; overflow-y: auto; padding: 40px;
            padding-bottom: 100px;
        }
        .content-scroll::-webkit-scrollbar { width: 8px; }
        .content-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .category-title {
            font-size: 18px; color: var(--neon-cyan); margin-bottom: 20px;
            text-transform: uppercase; letter-spacing: 1px; font-weight: 700;
            display: flex; align-items: center; gap: 10px;
        }
        .category-title::after { content:''; flex:1; height:1px; background: rgba(255,255,255,0.1); }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }

        /* Cards */
        .card {
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            aspect-ratio: 1/1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden;
        }
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--neon-pink);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            z-index: 2;
        }
        .card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0; transition: 0.3s;
        }
        .card:hover::before { opacity: 1; }

        .card-icon {
            width: 60px; height: 60px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
            color: #ddd; transition: 0.3s;
        }
        .card:hover .card-icon {
            background: white; color: black;
            box-shadow: 0 0 15px var(--neon-pink);
        }
        
        .card-title { font-size: 13px; font-weight: 600; color: #ccc; text-align: center; }
        .card:hover .card-title { color: white; }

        /* --- IFRAME OVERLAY --- */
        #app-frame {
            position: fixed; inset: 0; z-index: 100;
            background: #000; display: none; flex-direction: column;
        }
        #app-frame.active { display: flex; }
        
        .frame-header {
            height: 40px; background: #111; border-bottom: 1px solid #333;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }
        .app-meta { font-size: 13px; color: #888; display: flex; gap: 10px; align-items: center; }
        .close-btn { 
            color: #ff5555; cursor: pointer; padding: 5px 10px; 
            border-radius: 4px; font-weight: 700; font-size: 12px;
            background: rgba(255,0,0,0.1); transition: 0.2s;
        }
        .close-btn:hover { background: #ff5555; color: white; }
        
        iframe { flex: 1; border: none; background: white; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="brand"><i class="fa-solid fa-atom"></i> <b>ATOM</b></div>
        
        <div class="nav-item active" onclick="filterApps('all')">
            <i class="fa-solid fa-layer-group"></i> All Apps
        </div>
        <div class="nav-item" onclick="filterApps('retro')">
            <i class="fa-solid fa-gamepad"></i> Retro
        </div>
        <div class="nav-item" onclick="filterApps('sandbox')">
            <i class="fa-solid fa-cube"></i> Sandbox
        </div>
        <div class="nav-item" onclick="filterApps('action')">
            <i class="fa-solid fa-gun"></i> Action
        </div>
        <div class="nav-item" onclick="filterApps('social')">
            <i class="fa-brands fa-discord"></i> Social
        </div>
        <div class="nav-item" onclick="filterApps('tools')">
            <i class="fa-solid fa-toolbox"></i> Tools
        </div>

        <div class="nav-item panic-btn" onclick="panic()">
            <i class="fa-solid fa-eye-slash"></i> PANIC (])
        </div>
    </div>

    <!-- MAIN VIEW -->
    <div class="main-view">
        <div class="top-bar">
            <form class="search-container" id="search-form">
                <input type="text" class="search-input" id="search-box" placeholder="Search web, games, or paste iframe code..." autocomplete="off">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
            </form>
        </div>

        <div class="content-scroll" id="grid-container">
            <!-- Games injected here -->
        </div>
    </div>

    <!-- GAME OVERLAY -->
    <div id="app-frame">
        <div class="frame-header">
            <div class="app-meta">
                <i class="fa-solid fa-shield-halved" style="color:#00ff9d"></i>
                <span id="frame-status">Secure Proxy Connection</span>
            </div>
            <div class="close-btn" onclick="closeApp()">EXIT SESSION</div>
        </div>
        <iframe id="viewer" src="about:blank" allowfullscreen></iframe>
    </div>

    <!-- PROXY SCRIPTS -->
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>

    <script>
        // --- DATA LIBRARY ---
        const library = [
            // SOCIAL
            { name: "Discord", cat: "social", icon: "fa-brands fa-discord", url: "https://discord.com/app", color: "#5865F2" },
            { name: "YouTube", cat: "social", icon: "fa-brands fa-youtube", url: "https://youtube.com", color: "#FF0000" },
            { name: "TikTok", cat: "social", icon: "fa-brands fa-tiktok", url: "https://tiktok.com", color: "#000000" },
            { name: "Reddit", cat: "social", icon: "fa-brands fa-reddit", url: "https://reddit.com", color: "#FF4500" },
            { name: "Twitch", cat: "social", icon: "fa-brands fa-twitch", url: "https://twitch.tv", color: "#9146FF" },
            { name: "X / Twitter", cat: "social", icon: "fa-brands fa-x-twitter", url: "https://twitter.com", color: "#fff" },

            // SANDBOX & SIMULATION
            { name: "Minecraft (Eagle)", cat: "sandbox", icon: "fa-solid fa-cube", url: "https://eaglercraft.com/mc/1.8.8/", color: "#4ade80" },
            { name: "BitLife", cat: "sandbox", icon: "fa-solid fa-baby", url: "https://bitlifeonline.io/", color: "#fb923c" },
            { name: "Paper.io 2", cat: "sandbox", icon: "fa-solid fa-scroll", url: "https://paper-io.com/", color: "#22d3ee" },
            { name: "Cookie Clicker", cat: "sandbox", icon: "fa-solid fa-cookie-bite", url: "https://orteil.dashnet.org/cookieclicker/", color: "#a16207" },

            // ACTION & COMPETITIVE
            { name: "1v1.LOL", cat: "action", icon: "fa-solid fa-gun", url: "https://1v1.lol", color: "#f43f5e" },
            { name: "Shell Shockers", cat: "action", icon: "fa-solid fa-egg", url: "https://shellshock.io", color: "#fcd34d" },
            { name: "Krunker", cat: "action", icon: "fa-solid fa-crosshairs", url: "https://krunker.io", color: "#8b5cf6" },
            { name: "Subway Surfers", cat: "action", icon: "fa-solid fa-train", url: "https://poki.com/en/g/subway-surfers", color: "#3b82f6" },
            { name: "Temple Run 2", cat: "action", icon: "fa-solid fa-person-running", url: "https://poki.com/en/g/temple-run-2", color: "#10b981" },
            { name: "Slope", cat: "action", icon: "fa-solid fa-road", url: "https://slope-game.github.io/slope.html", color: "#22c55e" },
            { name: "Geometry Dash", cat: "action", icon: "fa-solid fa-square-caret-right", url: "https://geometrydash.io/", color: "#eab308" },

            // RETRO
            { name: "Sonic Mania", cat: "retro", icon: "fa-solid fa-bolt", url: "https://archive.org/embed/sonic-mania-v.-1.00", color: "#facc15" },
            { name: "Super Mario 64", cat: "retro", icon: "fa-solid fa-m", url: "https://augustberchelmann.com/mario/", color: "#ef4444" },
            { name: "Retro Bowl", cat: "retro", icon: "fa-solid fa-football", url: "https://retro-bowl.github.io/retro-bowl/", color: "#f97316" },
            { name: "Doom", cat: "retro", icon: "fa-solid fa-skull", url: "https://archive.org/embed/doom_202102", color: "#9ca3af" },
            { name: "Tetris", cat: "retro", icon: "fa-solid fa-layer-group", url: "https://tetris.com/play-tetris", color: "#a855f7" },
            { name: "Pacman", cat: "retro", icon: "fa-solid fa-ghost", url: "https://freepacman.org/", color: "#eab308" },

            // TOOLS
            { name: "Google", cat: "tools", icon: "fa-brands fa-google", url: "https://google.com", color: "#4285F4" },
            { name: "ChatGPT", cat: "tools", icon: "fa-solid fa-robot", url: "https://chat.openai.com", color: "#10a37f" },
            { name: "Mathway", cat: "tools", icon: "fa-solid fa-calculator", url: "https://mathway.com", color: "#000" },
            { name: "GeForce Now", cat: "tools", icon: "fa-solid fa-gamepad", url: "https://play.geforcenow.com", color: "#76b900" },
            { name: "Proxy Browser", cat: "tools", icon: "fa-solid fa-globe", url: "https://bing.com", color: "#00d2ff" }
        ];

        // --- CORE LOGIC ---
        const grid = document.getElementById('grid-container');
        const frame = document.getElementById('app-frame');
        const viewer = document.getElementById('viewer');
        const status = document.getElementById('frame-status');

        // 1. RENDERER
        function render(items) {
            grid.innerHTML = '';
            
            // Group by Category for cleaner look
            const categories = [...new Set(items.map(i => i.cat))];
            
            categories.forEach(cat => {
                const section = document.createElement('div');
                section.innerHTML = `<div class="category-title">${cat}</div>`;
                const row = document.createElement('div');
                row.className = 'grid';
                
                items.filter(i => i.cat === cat).forEach(game => {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.onclick = () => launch(game.url, game.name);
                    el.innerHTML = `
                        <div class="card-icon" style="color:${game.color}">
                            <i class="${game.icon}"></i>
                        </div>
                        <div class="card-title">${game.name}</div>
                    `;
                    row.appendChild(el);
                });
                
                section.appendChild(row);
                grid.appendChild(section);
            });
        }

        // 2. SEARCH & FILTER
        function filterApps(cat) {
            // Update sidebar UI
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if(cat === 'all') render(library);
            else render(library.filter(i => i.cat === cat));
        }

        document.getElementById('search-box').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if(!term) return render(library);
            
            const matches = library.filter(i => i.name.toLowerCase().includes(term));
            render(matches);
        });

        // 3. PROXY LAUNCHER (The Engine)
        async function registerSW() {
            if (!navigator.serviceWorker) throw new Error("SW not supported");
            await navigator.serviceWorker.register('/uv/sw.js', { scope: __uv$config.prefix });
        }

        async function launch(url, title) {
            frame.classList.add('active');
            status.innerText = `Connecting to ${title || 'URL'}...`;
            viewer.src = "about:blank"; // Reset

            // 3.1. Handle Raw Iframe Codes (pasted from inspect element)
            if(url.includes('<iframe')) {
                const match = url.match(/src=["']([^"']+)["']/);
                if(match) url = match[1];
            }

            // 3.2. Handle Relative URLs from Truffled-like sites
            if(url.startsWith('/') && !url.startsWith('//')) {
                // Heuristic: If user pastes "/extra/...", assume truffled.lol
                url = 'https://truffled.lol' + url;
            }

            // 3.3. Normalize URL
            url = url.trim();
            if(!url.startsWith('http') && !url.includes(' ')) {
                if(url.includes('.')) url = 'https://' + url;
                else url = 'https://search.brave.com/search?q=' + encodeURIComponent(url);
            }

            // 3.4. Proxy Injection
            if(typeof Ultraviolet === 'undefined') {
                console.warn("Ultraviolet not found. Demo Mode.");
                viewer.src = url; // Fallback
                return;
            }

            try {
                await registerSW();
                const safeUrl = __uv$config.prefix + __uv$config.encodeUrl(url);
                viewer.src = safeUrl;
                viewer.onload = () => status.innerText = "Secure Session Active";
            } catch(e) {
                status.innerText = "Connection Failed. Check Console.";
                console.error(e);
            }
        }

        function closeApp() {
            frame.classList.remove('active');
            viewer.src = "about:blank"; // Kill process
        }

        // 4. PANIC BUTTON
        function panic() {
            window.location.href = "https://classroom.google.com";
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === ']') panic();
        });

        // 5. MANUAL SEARCH SUBMIT
        document.getElementById('search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            launch(document.getElementById('search-box').value, "Web");
        });

        // INIT
        render(library);

    </script>
</body>
</html>
