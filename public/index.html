<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atom</title>
    
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js", { scope: __uv$config.prefix });
            });
        }
    </script>

    <style>
        :root {
            --accent: #7000ff;
            --bg: #050208;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: var(--bg);
            background-image: radial-gradient(circle at center, #1a0b2e 0%, #050208 100%);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 5px;
            letter-spacing: -2px;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-top: 30px;
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 25px;
            border-radius: 18px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input:focus {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        button {
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn-roblox {
            background: white;
            color: black;
        }

        .btn-search {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        button:hover {
            opacity: 0.85;
            transform: scale(1.02);
        }

        #viewport {
            position: fixed;
            inset: 0;
            display: none;
            background: black;
            z-index: 1000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 30px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>atom</h1>
        
        <div class="input-group">
            <input type="text" id="mainInput" placeholder="url or search...">
            <div class="actions">
                <button class="btn-roblox" onclick="launch('https://roblox.com')">roblox</button>
                <button class="btn-search" onclick="launch(document.getElementById('mainInput').value)">launch</button>
            </div>
        </div>
    </div>

    <div id="viewport">
        <iframe id="uvFrame"></iframe>
        <button class="close-btn" onclick="exit()">exit session</button>
    </div>

    <script>
        const frame = document.getElementById('uvFrame');
        const vp = document.getElementById('viewport');
        const input = document.getElementById('mainInput');

        function launch(val) {
            let url = val.trim();
            if (!url) return;

            if (url === 'https://roblox.com') {
                // roblox specific launch
            } else if (!url.includes('.')) {
                // if it's not a link, use brave (better for proxies)
                url = 'https://search.brave.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
            vp.style.display = 'block';
        }

        function exit() {
            vp.style.display = 'none';
            frame.src = 'about:blank';
        }

        input.onkeydown = (e) => { if (e.key === 'Enter') launch(input.value); };
    </script>
</body>
</html>
