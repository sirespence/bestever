<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATOM — Roblox</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* =====================================================
   ATOM — FRUTIGER AERO + SPACE SKEUOMORPHIC
   Drop this index.html into an Ultraviolet Node project.
   UV files expected at: /uv/uv.bundle.js, /uv/uv.config.js
   Bare server expected at: /bare/
   ===================================================== */

:root {
  --space: #04080f;
  --deep: #060d1a;
  --panel: rgba(12, 28, 52, 0.72);
  --panel-light: rgba(20, 45, 80, 0.6);
  --glass-top: rgba(255,255,255,0.18);
  --glass-mid: rgba(255,255,255,0.06);
  --glass-edge: rgba(255,255,255,0.25);
  --rim: rgba(120, 200, 255, 0.22);
  --rim-hi: rgba(160, 220, 255, 0.5);
  --blue: #4db8ff;
  --blue-glow: rgba(77, 184, 255, 0.4);
  --teal: #2affcc;
  --teal-dim: rgba(42, 255, 204, 0.15);
  --white: #f0f8ff;
  --dim: rgba(180, 210, 240, 0.45);
  --red: #ff4466;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--space);
  color: var(--white);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── SPACE BG ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 120% 70% at 50% -10%,  rgba(10, 60, 120, 0.7)  0%, transparent 55%),
    radial-gradient(ellipse 60%  50% at 0%   60%,  rgba(0,  30,  80, 0.5)  0%, transparent 50%),
    radial-gradient(ellipse 50%  40% at 100% 80%,  rgba(20, 60, 100, 0.4)  0%, transparent 50%),
    radial-gradient(ellipse 30%  30% at 80%  10%,  rgba(0, 100, 180, 0.25) 0%, transparent 40%);
  pointer-events: none;
}

/* Starfield */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    radial-gradient(1px 1px at  8% 12%, rgba(200,230,255,.9) 0,transparent 1px),
    radial-gradient(1px 1px at 17% 28%, rgba(200,230,255,.6) 0,transparent 1px),
    radial-gradient(1.5px 1.5px at 24%  5%, rgba(220,240,255,1)  0,transparent 1px),
    radial-gradient(1px 1px at 33% 55%, rgba(200,230,255,.7) 0,transparent 1px),
    radial-gradient(1px 1px at 41% 18%, rgba(200,230,255,.5) 0,transparent 1px),
    radial-gradient(1px 1px at 52%  8%, rgba(220,240,255,.8) 0,transparent 1px),
    radial-gradient(1px 1px at 60% 42%, rgba(200,230,255,.6) 0,transparent 1px),
    radial-gradient(1.5px 1.5px at 67% 72%, rgba(220,240,255,.9) 0,transparent 1px),
    radial-gradient(1px 1px at 74% 22%, rgba(200,230,255,.5) 0,transparent 1px),
    radial-gradient(1px 1px at 83% 88%, rgba(200,230,255,.7) 0,transparent 1px),
    radial-gradient(1px 1px at 91% 35%, rgba(220,240,255,.8) 0,transparent 1px),
    radial-gradient(1px 1px at 96% 60%, rgba(200,230,255,.5) 0,transparent 1px),
    radial-gradient(1px 1px at  3% 78%, rgba(200,230,255,.6) 0,transparent 1px),
    radial-gradient(1px 1px at 48% 92%, rgba(200,230,255,.4) 0,transparent 1px),
    radial-gradient(1px 1px at 12% 50%, rgba(200,230,255,.5) 0,transparent 1px);
  pointer-events: none;
}

/* ── LAYOUT ── */
.shell {
  position: relative; z-index: 10;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOP BAR — GLASS PANEL ── */
.topbar {
  flex-shrink: 0;
  height: 60px;
  display: flex; align-items: center;
  padding: 0 20px;
  gap: 16px;
  /* Frutiger glass */
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.16) 0%,
    rgba(255,255,255,0.06) 50%,
    rgba(0,30,70,0.4) 100%
  );
  border-bottom: 1px solid var(--rim);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.22),
    0 2px 20px rgba(0,0,0,0.4);
  backdrop-filter: blur(18px);
}

.logo {
  font-size: 22px; font-weight: 900;
  letter-spacing: 4px;
  background: linear-gradient(135deg, #ffffff 30%, #7dd8ff 70%, #2affcc 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 8px rgba(77,184,255,0.6));
  flex-shrink: 0;
}

.topbar-sep {
  width: 1px; height: 24px;
  background: linear-gradient(180deg, transparent, var(--rim-hi), transparent);
}

/* Address bar — skeuomorphic inset */
.address-wrap {
  flex: 1; max-width: 560px;
  position: relative;
}

.address-bar {
  width: 100%;
  background: linear-gradient(180deg, rgba(0,10,30,0.8) 0%, rgba(0,20,50,0.6) 100%);
  border: 1px solid rgba(80,160,255,0.3);
  border-top-color: rgba(20,60,120,0.8);
  border-radius: 10px;
  padding: 9px 42px 9px 14px;
  color: var(--white);
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 500;
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,0.5),
    inset 0 1px 2px rgba(0,0,0,0.4),
    0 1px 0 rgba(255,255,255,0.08);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.address-bar::placeholder { color: rgba(150,190,230,0.4); }
.address-bar:focus {
  outline: none;
  border-color: rgba(77,184,255,0.6);
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,0.5),
    0 0 0 2px rgba(77,184,255,0.15),
    0 0 12px rgba(77,184,255,0.1);
}

/* Go button — pill glass */
.go-btn {
  position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
  width: 30px; height: 26px;
  background: linear-gradient(180deg, rgba(77,184,255,0.35) 0%, rgba(30,100,200,0.5) 100%);
  border: 1px solid rgba(120,200,255,0.4);
  border-top-color: rgba(200,235,255,0.4);
  border-radius: 7px;
  color: #c0e8ff;
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 1px 3px rgba(0,0,0,0.4);
  transition: all 0.15s;
}
.go-btn:hover {
  background: linear-gradient(180deg, rgba(100,210,255,0.5) 0%, rgba(40,120,220,0.7) 100%);
  color: #fff;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 0 10px rgba(77,184,255,0.3);
}

/* Right-side status pill */
.status-pill {
  margin-left: auto;
  display: flex; align-items: center; gap: 7px;
  background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.04) 100%);
  border: 1px solid var(--rim);
  border-radius: 20px;
  padding: 5px 12px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 6px var(--teal), 0 0 12px rgba(42,255,204,0.3);
  animation: breathe 2.5s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:.5; transform:scale(.85); }
}
.status-text {
  font-size: 11px; font-weight: 700;
  letter-spacing: 1px; color: var(--dim);
  text-transform: uppercase;
}

/* ── CONTENT ROW ── */
.content-row {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 68px;
  flex-shrink: 0;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 16px 0;
  gap: 4px;
  background: linear-gradient(
    90deg,
    rgba(255,255,255,0.07) 0%,
    rgba(255,255,255,0.02) 100%
  );
  border-right: 1px solid var(--rim);
  box-shadow: inset -1px 0 0 rgba(255,255,255,0.04), 1px 0 12px rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

.sib {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  gap: 3px;
}
.sib:hover {
  background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 12px rgba(77,184,255,0.15);
}
.sib.active {
  background: linear-gradient(180deg, rgba(77,184,255,0.3) 0%, rgba(30,100,200,0.4) 100%);
  border: 1px solid rgba(120,200,255,0.4);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 16px rgba(77,184,255,0.25);
}
.sib-icon { font-size: 20px; line-height: 1; }
.sib-label {
  font-size: 8px; font-weight: 700; letter-spacing: .5px;
  text-transform: uppercase; color: var(--dim);
}
.sib.active .sib-label { color: var(--blue); }

.sib-spacer { flex: 1; }

/* Panic — red pill button */
.panic-btn {
  width: 44px; height: 30px;
  border-radius: 15px;
  background: linear-gradient(180deg, rgba(255,60,80,0.3) 0%, rgba(180,20,40,0.5) 100%);
  border: 1px solid rgba(255,80,100,0.4);
  border-top-color: rgba(255,160,170,0.3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 14px;
  box-shadow: inset 0 1px 0 rgba(255,200,200,0.15), 0 0 10px rgba(255,50,70,0.1);
  transition: all 0.15s;
}
.panic-btn:hover {
  background: linear-gradient(180deg, rgba(255,80,100,0.5) 0%, rgba(200,30,50,0.7) 100%);
  box-shadow: inset 0 1px 0 rgba(255,200,200,0.2), 0 0 16px rgba(255,50,70,0.35);
}

/* ── MAIN AREA ── */
.main {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── HOME PAGE ── */
#page-home {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  padding: 40px;
}

.hero-glow {
  width: 320px; height: 320px;
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(30,100,200,0.2) 0%, transparent 70%);
  pointer-events: none;
  filter: blur(40px);
}

.hero-title {
  font-size: clamp(48px, 7vw, 72px);
  font-weight: 900;
  letter-spacing: -1px;
  text-align: center;
  line-height: 1;
  background: linear-gradient(160deg, #ffffff 20%, #7dd8ff 55%, #2affcc 90%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 30px rgba(77,184,255,0.35));
  margin-bottom: 8px;
  position: relative; z-index: 1;
}

.hero-sub {
  font-size: 14px; font-weight: 600; letter-spacing: 3px;
  color: var(--dim); text-transform: uppercase;
  margin-bottom: 36px;
  position: relative; z-index: 1;
}

/* Big search — skeuomorphic glass pill */
.hero-search {
  position: relative; z-index: 1;
  width: 100%; max-width: 580px;
}

.hero-input {
  width: 100%;
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.14) 0%,
    rgba(255,255,255,0.06) 48%,
    rgba(10,30,70,0.5) 100%
  );
  border: 1px solid rgba(140,200,255,0.35);
  border-top-color: rgba(200,230,255,0.5);
  border-radius: 18px;
  padding: 18px 60px 18px 26px;
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 16px; font-weight: 500;
  backdrop-filter: blur(16px);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.2),
    inset 0 -1px 0 rgba(0,0,0,0.3),
    0 8px 32px rgba(0,0,0,0.5),
    0 2px 8px rgba(0,0,0,0.3);
  transition: all 0.2s;
}
.hero-input::placeholder { color: rgba(180,210,240,0.45); font-style: italic; }
.hero-input:focus {
  outline: none;
  border-color: rgba(77,184,255,0.6);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.2),
    inset 0 -1px 0 rgba(0,0,0,0.3),
    0 8px 32px rgba(0,0,0,0.5),
    0 0 0 3px rgba(77,184,255,0.12),
    0 0 30px rgba(77,184,255,0.12);
}

.hero-go {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 44px; height: 38px;
  background: linear-gradient(
    180deg,
    rgba(100,200,255,0.5) 0%,
    rgba(40,130,230,0.7) 45%,
    rgba(20,80,180,0.8) 100%
  );
  border: 1px solid rgba(140,210,255,0.5);
  border-top-color: rgba(220,245,255,0.5);
  border-radius: 12px;
  color: #fff; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.3),
    inset 0 -1px 0 rgba(0,0,0,0.3),
    0 2px 8px rgba(0,0,0,0.4);
  transition: all 0.15s;
}
.hero-go:hover {
  background: linear-gradient(
    180deg,
    rgba(140,220,255,0.6) 0%,
    rgba(60,160,255,0.8) 45%,
    rgba(30,100,220,0.9) 100%
  );
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 0 20px rgba(77,184,255,0.4);
}

.search-hint {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  color: var(--dim); margin-top: 12px;
  position: relative; z-index: 1;
}

/* ── GAMES PAGE ── */
#page-games {
  flex: 1; overflow-y: auto;
  padding: 28px 28px;
  display: none;
}
#page-games::-webkit-scrollbar { width: 5px; }
#page-games::-webkit-scrollbar-thumb {
  background: rgba(77,184,255,0.2); border-radius: 3px;
}

.section-head {
  font-size: 11px; font-weight: 800;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(120,180,230,0.6);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.section-head::after {
  content: '';
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--rim), transparent);
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}

/* Frutiger-aero card — glass with shine */
.card {
  background: linear-gradient(
    160deg,
    rgba(255,255,255,0.13) 0%,
    rgba(255,255,255,0.05) 40%,
    rgba(10,30,70,0.55) 100%
  );
  border: 1px solid var(--rim);
  border-top-color: var(--glass-edge);
  border-radius: 16px;
  padding: 18px 14px 14px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(.25,.8,.25,1);
  display: flex; flex-direction: column;
  align-items: flex-start; gap: 8px;
  position: relative; overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.18),
    0 4px 16px rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
}

/* Shine streak */
.card::before {
  content: '';
  position: absolute; top: 0; left: -40%; right: 60%; height: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  border-radius: 16px 0 0 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.card:hover {
  transform: translateY(-3px);
  border-color: rgba(120,200,255,0.45);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.22),
    0 8px 28px rgba(0,0,0,0.5),
    0 0 20px rgba(77,184,255,0.15);
}

.card-emoji { font-size: 28px; line-height: 1; }
.card-name {
  font-size: 12px; font-weight: 800;
  color: rgba(220,240,255,0.95); line-height: 1.3;
}
.card-meta {
  font-size: 10px; font-weight: 600;
  color: var(--dim); letter-spacing: .5px;
}

/* Green online dot */
.card-live {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700;
  color: var(--teal);
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 5px var(--teal);
}

/* ── BROWSE PAGE ── */
#page-browse {
  flex: 1; overflow-y: auto;
  padding: 28px 28px;
  display: none;
}
#page-browse::-webkit-scrollbar { width: 5px; }
#page-browse::-webkit-scrollbar-thumb {
  background: rgba(77,184,255,0.2); border-radius: 3px;
}

.browse-list {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 32px;
}

.browse-item {
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.1) 0%,
    rgba(255,255,255,0.03) 50%,
    rgba(5,20,50,0.5) 100%
  );
  border: 1px solid var(--rim);
  border-top-color: rgba(200,230,255,0.2);
  border-radius: 12px;
  padding: 13px 16px;
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: all 0.15s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 8px rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);
}
.browse-item:hover {
  border-color: rgba(120,200,255,0.4);
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.16) 0%,
    rgba(255,255,255,0.06) 50%,
    rgba(10,30,70,0.5) 100%
  );
  transform: translateX(2px);
}
.bi-icon { font-size: 22px; flex-shrink: 0; }
.bi-info {}
.bi-name { font-size: 13px; font-weight: 800; color: var(--white); }
.bi-desc { font-size: 11px; color: var(--dim); font-weight: 500; margin-top: 1px; }

/* ── FRAME OVERLAY ── */
#frame-wrap {
  position: fixed; inset: 0; z-index: 500;
  display: none; flex-direction: column;
}
#frame-wrap.open { display: flex; }

.frame-bar {
  flex-shrink: 0; height: 44px;
  display: flex; align-items: center;
  padding: 0 14px; gap: 10px;
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.14) 0%,
    rgba(255,255,255,0.05) 50%,
    rgba(0,15,40,0.85) 100%
  );
  border-bottom: 1px solid var(--rim);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 2px 12px rgba(0,0,0,0.5);
  backdrop-filter: blur(20px);
}

/* Traffic-light style buttons — skeuomorphic circles */
.fb-close {
  width: 16px; height: 16px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #ff8095, #e02040);
  border: 1px solid rgba(200,20,40,0.6);
  box-shadow: inset 0 1px 0 rgba(255,200,200,0.3), 0 1px 3px rgba(0,0,0,0.4);
  cursor: pointer;
  transition: filter .15s;
}
.fb-close:hover { filter: brightness(1.3); }

.frame-title {
  font-size: 12px; font-weight: 700;
  color: var(--dim); letter-spacing: .5px;
}

.frame-url {
  flex: 1; max-width: 400px;
  background: linear-gradient(180deg, rgba(0,8,24,0.8) 0%, rgba(0,15,40,0.6) 100%);
  border: 1px solid rgba(80,140,220,0.3);
  border-top-color: rgba(20,50,100,0.8);
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 11px; font-weight: 500;
  color: var(--dim);
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

#viewer { flex: 1; border: none; background: #fff; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, rgba(10,30,70,0.92), rgba(5,18,45,0.95));
  border: 1px solid var(--rim);
  border-top-color: rgba(200,230,255,0.25);
  border-radius: 12px;
  padding: 10px 20px;
  font-size: 12px; font-weight: 700; color: var(--dim);
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
  z-index: 900;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="shell">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">ATOM</div>
    <div class="topbar-sep"></div>
    <div class="address-wrap">
      <input class="address-bar" id="addr-bar"
        placeholder="Search or enter URL..."
        onkeydown="if(event.key==='Enter') launch(this.value, 'Web')">
      <div class="go-btn" onclick="launch(document.getElementById('addr-bar').value,'Web')">↵</div>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <div class="status-text" id="status-text">Ready</div>
    </div>
  </div>

  <div class="content-row">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sib active" id="sib-home" onclick="showPage('home')">
        <div class="sib-icon">⌂</div>
        <div class="sib-label">Home</div>
      </div>
      <div class="sib" id="sib-games" onclick="showPage('games')">
        <div class="sib-icon">◈</div>
        <div class="sib-label">Games</div>
      </div>
      <div class="sib" id="sib-browse" onclick="showPage('browse')">
        <div class="sib-icon">⊞</div>
        <div class="sib-label">Browse</div>
      </div>
      <div class="sib-spacer"></div>
      <div class="panic-btn" title="Panic [  ]" onclick="panic()">⚑</div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- HOME -->
      <div id="page-home">
        <div class="hero-glow"></div>
        <div class="hero-title">Welcome to ATOM</div>
        <div class="hero-sub">Roblox · Proxy · Space</div>
        <div class="hero-search">
          <input class="hero-input" id="hero-input"
            placeholder="Search Google or type a URL..."
            onkeydown="if(event.key==='Enter') launch(this.value,'Web')">
          <div class="hero-go" onclick="launch(document.getElementById('hero-input').value,'Web')">→</div>
        </div>
        <div class="search-hint">press enter &nbsp;·&nbsp; ] to panic</div>
      </div>

      <!-- GAMES -->
      <div id="page-games">
        <div class="section-head">Popular</div>
        <div class="cards" id="cards-popular"></div>
        <div class="section-head">Action</div>
        <div class="cards" id="cards-action"></div>
        <div class="section-head">Roleplay</div>
        <div class="cards" id="cards-rp"></div>
      </div>

      <!-- BROWSE -->
      <div id="page-browse">
        <div class="section-head">Roblox Pages</div>
        <div class="browse-list" id="browse-list"></div>
        <div class="section-head">Web</div>
        <div class="browse-list" id="browse-web"></div>
      </div>

    </div>
  </div>
</div>

<!-- FRAME -->
<div id="frame-wrap">
  <div class="frame-bar">
    <div class="fb-close" onclick="closeFrame()"></div>
    <div class="frame-title" id="frame-title">—</div>
    <div class="frame-url" id="frame-url-bar"></div>
  </div>
  <iframe id="viewer" src="about:blank" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals"></iframe>
</div>

<div class="toast" id="toast"></div>

<!-- UV SCRIPTS — these must exist on your server -->
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>

<script>

/* =============================================
   DATA
   ============================================= */
const GAMES = {
  popular: [
    { name: "Blox Fruits",     emoji: "🍎", meta: "~600k playing", url: "https://www.roblox.com/games/2753915549" },
    { name: "Adopt Me!",       emoji: "🐾", meta: "~500k playing", url: "https://www.roblox.com/games/920587237" },
    { name: "Pet Sim 99",      emoji: "🐶", meta: "~300k playing", url: "https://www.roblox.com/games/15532962292" },
    { name: "Dress to Impress",emoji: "👗", meta: "~250k playing", url: "https://www.roblox.com/games/15532962292" },
    { name: "Doors",           emoji: "🚪", meta: "~200k playing", url: "https://www.roblox.com/games/6516141723" },
    { name: "Murder Mystery 2",emoji: "🔪", meta: "~150k playing", url: "https://www.roblox.com/games/142823291" },
  ],
  action: [
    { name: "Jailbreak",       emoji: "🚔", meta: "~120k playing", url: "https://www.roblox.com/games/606849621" },
    { name: "Anime Fighters",  emoji: "⚔️",  meta: "~100k playing", url: "https://www.roblox.com/games/6443800528" },
    { name: "Tower of Hell",   emoji: "🗼", meta: "~90k playing",  url: "https://www.roblox.com/games/1962086868" },
    { name: "Arsenal",         emoji: "🔫", meta: "~80k playing",  url: "https://www.roblox.com/games/286090429" },
  ],
  rp: [
    { name: "Brookhaven RP",   emoji: "🏡", meta: "~400k playing", url: "https://www.roblox.com/games/4924922222" },
    { name: "Work at a Pizza", emoji: "🍕", meta: "~60k playing",  url: "https://www.roblox.com/games/192800" },
    { name: "Royale High",     emoji: "👑", meta: "~70k playing",  url: "https://www.roblox.com/games/735030788" },
    { name: "Welcome to Blox.",emoji: "🏙️", meta: "~50k playing",  url: "https://www.roblox.com/games/185655149" },
  ]
};

const BROWSE_ROBLOX = [
  { emoji:"🏠", name:"Home",        desc:"Your Roblox feed",          url:"https://www.roblox.com/home" },
  { emoji:"🔍", name:"Discover",    desc:"Explore all games",          url:"https://www.roblox.com/discover" },
  { emoji:"🧍", name:"Avatar",      desc:"Customize your character",   url:"https://www.roblox.com/my/avatar" },
  { emoji:"🎨", name:"Catalog",     desc:"Shop avatar items",          url:"https://www.roblox.com/catalog" },
  { emoji:"💎", name:"Robux",       desc:"Get Robux",                  url:"https://www.roblox.com/upgrades/robux" },
  { emoji:"👥", name:"Friends",     desc:"See who's online",           url:"https://www.roblox.com/users/friends" },
  { emoji:"🌐", name:"Groups",      desc:"Browse groups",              url:"https://www.roblox.com/groups" },
  { emoji:"🛠️", name:"Create",      desc:"Open Roblox Studio",         url:"https://www.roblox.com/create" },
];

const BROWSE_WEB = [
  { emoji:"🔵", name:"YouTube",     desc:"Watch videos",               url:"https://www.youtube.com" },
  { emoji:"🟣", name:"Discord",     desc:"Chat with friends",          url:"https://discord.com/app" },
  { emoji:"🟠", name:"Reddit",      desc:"Browse the front page",      url:"https://www.reddit.com" },
  { emoji:"🔴", name:"Google",      desc:"Search the web",             url:"https://www.google.com" },
];

/* =============================================
   BUILD UI
   ============================================= */
function makeCard(item) {
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <div class="card-emoji">${item.emoji}</div>
    <div class="card-name">${item.name}</div>
    <div class="card-live"><div class="live-dot"></div>${item.meta}</div>
  `;
  el.onclick = () => launch(item.url, item.name);
  return el;
}

function makeBrowseItem(item) {
  const el = document.createElement('div');
  el.className = 'browse-item';
  el.innerHTML = `<div class="bi-icon">${item.emoji}</div><div class="bi-info"><div class="bi-name">${item.name}</div><div class="bi-desc">${item.desc}</div></div>`;
  el.onclick = () => launch(item.url, item.name);
  return el;
}

Object.entries(GAMES).forEach(([cat, items]) => {
  const grid = document.getElementById('cards-' + cat);
  if (grid) items.forEach(i => grid.appendChild(makeCard(i)));
});
BROWSE_ROBLOX.forEach(i => document.getElementById('browse-list').appendChild(makeBrowseItem(i)));
BROWSE_WEB.forEach(i => document.getElementById('browse-web').appendChild(makeBrowseItem(i)));

/* =============================================
   NAVIGATION
   ============================================= */
function showPage(page) {
  ['home','games','browse'].forEach(p => {
    const pg = document.getElementById('page-' + p);
    const sb = document.getElementById('sib-' + p);
    if (pg) pg.style.display = 'none';
    if (sb) sb.classList.remove('active');
  });
  const target = document.getElementById('page-' + page);
  const btn    = document.getElementById('sib-' + page);
  if (target) target.style.display = page === 'home' ? 'flex' : 'block';
  if (btn) btn.classList.add('active');
  if (page === 'home') setTimeout(() => document.getElementById('hero-input').focus(), 60);
}

/* =============================================
   PROXY LAUNCH — Ultraviolet
   ============================================= */
let swRegistered = false;

async function ensureSW() {
  if (swRegistered) return;
  if (!navigator.serviceWorker) throw new Error('Service workers not supported');
  await navigator.serviceWorker.register('/uv/sw.js', { scope: __uv$config.prefix });
  swRegistered = true;
}

async function launch(raw, title) {
  raw = (raw || '').trim();
  if (!raw) return;

  // Normalise URL
  let url = raw;
  if (!url.startsWith('http')) {
    if (url.includes('.') && !url.includes(' ')) {
      url = 'https://' + url;
    } else {
      url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
    }
  }

  // Update address bar
  document.getElementById('addr-bar').value = url;

  // Open frame immediately with loading screen
  document.getElementById('frame-title').textContent = title || url;
  document.getElementById('frame-url-bar').textContent = url;
  document.getElementById('viewer').src = 'about:blank';
  document.getElementById('frame-wrap').classList.add('open');

  setStatus('Connecting…', false);

  try {
    if (typeof __uv$config === 'undefined') {
      // UV not available — direct iframe (will be blocked by X-Frame-Options on most sites)
      document.getElementById('viewer').src = url;
      setStatus('Direct Mode', true);
      toast('⚠️ UV not loaded — using direct mode');
      return;
    }
    await ensureSW();
    const encoded = __uv$config.prefix + __uv$config.encodeUrl(url);
    document.getElementById('viewer').src = encoded;
    setStatus('Proxied ✓', true);
  } catch (err) {
    console.error('UV Error:', err);
    // Fallback to direct
    document.getElementById('viewer').src = url;
    setStatus('Direct Mode', true);
    toast('UV unavailable: ' + err.message);
  }
}

function closeFrame() {
  document.getElementById('frame-wrap').classList.remove('open');
  document.getElementById('viewer').src = 'about:blank';
  setStatus('Ready', true);
}

function setStatus(msg, green) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status-dot').style.background = green ? 'var(--teal)' : '#f0a030';
  document.getElementById('status-dot').style.boxShadow = green
    ? '0 0 6px var(--teal), 0 0 12px rgba(42,255,204,0.3)'
    : '0 0 6px #f0a030';
}

/* =============================================
   TOAST
   ============================================= */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

/* =============================================
   PANIC
   ============================================= */
function panic() {
  window.location.replace('https://classroom.google.com');
}

document.addEventListener('keydown', e => {
  if (e.key === ']') panic();
  if (e.key === 'Escape') closeFrame();
});

/* =============================================
   INIT
   ============================================= */
showPage('home');

</script>
</body>
</html>
