<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATOM | Minimal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CORE VARIABLES --- */
        :root {
            --bg-deep: #050505;
            --bg-card: #0f0f0f;
            --border: #222;
            --accent: #3b82f6; /* Electric Blue */
            --text-main: #ededed;
            --text-muted: #666;
            --glow: 0 0 20px rgba(59, 130, 246, 0.15);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); outline: none; }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #050505 60%);
        }

        /* --- THE ORBIT LOADER (Minimalist Logo) --- */
        .logo-container {
            margin-bottom: 40px;
            position: relative;
            width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
        }

        .atom-core {
            width: 12px; height: 12px;
            background: var(--text-main);
            border-radius: 50%;
            box-shadow: 0 0 15px white;
            z-index: 2;
        }

        .atom-ring {
            position: absolute;
            width: 100%; height: 100%;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }
        
        .atom-ring::after {
            content: ''; position: absolute; top: 50%; left: -3px;
            width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        .r2 { width: 70%; height: 70%; animation-duration: 7s; border-color: rgba(255,255,255,0.1); }
        .r2::after { background: #fff; box-shadow: 0 0 5px #fff; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- MAIN CONTAINER --- */
        .container {
            width: 100%; max-width: 600px;
            padding: 20px;
            text-align: center;
            animation: fadeUp 0.8s ease-out;
        }

        h1 {
            font-size: 24px; font-weight: 400; letter-spacing: 4px;
            margin-bottom: 30px; text-transform: uppercase;
            color: rgba(255,255,255,0.8);
        }

        /* --- OMNIBAR (Search) --- */
        .omnibar-wrapper {
            position: relative;
            margin-bottom: 50px;
        }

        .omnibar {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 16px 20px;
            font-size: 16px;
            color: white;
            border-radius: 12px;
            transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-align: center;
        }

        .omnibar:focus {
            border-color: var(--accent);
            box-shadow: var(--glow);
            transform: scale(1.02);
        }
        
        .omnibar::placeholder { color: #333; letter-spacing: 1px; }

        /* --- GRID SYSTEM --- */
        .section-title {
            text-align: left; font-size: 12px; color: var(--text-muted);
            margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;
            padding-left: 5px; border-left: 2px solid var(--accent);
        }

        .grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            height: 90px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative; overflow: hidden;
        }

        .card:hover {
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-5px);
            background: #141414;
        }

        .card i { font-size: 24px; margin-bottom: 8px; color: #ccc; transition: 0.3s; }
        .card:hover i { color: white; }
        
        .card span { font-size: 11px; color: var(--text-muted); font-weight: 500; }
        .card:hover span { color: var(--text-main); }

        /* Specific Colors for Hover */
        .card:hover .fa-discord { color: #5865F2; }
        .card:hover .fa-youtube { color: #ff3333; }
        .card:hover .fa-bolt { color: #facc15; } /* Sonic Yellow */
        .card:hover .fa-cube { color: #4ade80; } /* Minecraft Green */

        /* --- FOOTER --- */
        .footer {
            font-size: 11px; color: #333; margin-top: auto;
            position: absolute; bottom: 20px;
        }
        .footer span { color: #444; cursor: pointer; margin: 0 5px; }
        .footer span:hover { color: var(--accent); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="logo-container">
        <div class="atom-ring"></div>
        <div class="atom-ring r2"></div>
        <div class="atom-core"></div>
    </div>

    <div class="container">
        <h1>Atom<b style="font-weight:700; color:white;">OS</b></h1>

        <!-- Search -->
        <form id="proxy-form" class="omnibar-wrapper">
            <input type="text" class="omnibar" id="uv-address" placeholder="SEARCH OR TYPE URL" autocomplete="off">
        </form>

        <!-- Apps Section -->
        <div class="section-title">Essentials</div>
        <div class="grid">
            <div class="card" onclick="launch('https://discord.com')">
                <i class="fa-brands fa-discord"></i>
                <span>Discord</span>
            </div>
            <div class="card" onclick="launch('https://youtube.com')">
                <i class="fa-brands fa-youtube"></i>
                <span>YouTube</span>
            </div>
            <div class="card" onclick="launch('https://tiktok.com')">
                <i class="fa-brands fa-tiktok"></i>
                <span>TikTok</span>
            </div>
            <div class="card" onclick="launch('https://google.com')">
                <i class="fa-brands fa-google"></i>
                <span>Google</span>
            </div>
        </div>

        <!-- WASM Games Section (The "How Truffled Does It" Section) -->
        <div class="section-title">WASM Arcade</div>
        <div class="grid">
            <div class="card" onclick="launch('https://archive.org/details/sonic-mania-v.-1.00')"> 
                <!-- Note: In a real environment, you point this to your internal WASM loader -->
                <i class="fa-solid fa-bolt"></i>
                <span>Sonic Mania</span>
            </div>
            <div class="card" onclick="launch('https://eaglercraft.com')">
                <i class="fa-solid fa-cube"></i>
                <span>Minecraft</span>
            </div>
            <div class="card" onclick="launch('https://poki.com/en/g/subway-surfers')">
                <i class="fa-solid fa-train-subway"></i>
                <span>Subway Surf</span>
            </div>
            <div class="card" onclick="launch('https://kbhgames.com')">
                <i class="fa-solid fa-ghost"></i>
                <span>More Games</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <span>Powered by Ultraviolet</span> &bull; <span>Vercel Deploy</span> &bull; <span>v3.0 Minimal</span>
    </div>

    <!-- 
       === CONFIGURATION === 
       Standard UV setup logic
    -->
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>

    <script>
        const form = document.getElementById('proxy-form');
        const input = document.getElementById('uv-address');

        async function registerSW() {
            if (!navigator.serviceWorker) throw new Error("SW not supported");
            await navigator.serviceWorker.register('/uv/sw.js', { scope: __uv$config.prefix });
        }

        async function launch(url) {
            // Minimal feedback - just a placeholder change
            input.placeholder = "CONNECTING...";
            input.value = "";
            
            if (typeof Ultraviolet === 'undefined') {
                // Fallback for demo
                window.location.href = url;
                return;
            }

            try { await registerSW(); } catch (err) { console.error(err); }

            let processedUrl = url.trim();
            if (!isUrl(processedUrl)) processedUrl = 'https://www.google.com/search?q=' + processedUrl;
            else if (!(processedUrl.startsWith('http://') || processedUrl.startsWith('https://'))) processedUrl = 'http://' + processedUrl;

            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(processedUrl);
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            launch(input.value);
        });

        function isUrl(val = '') {
            return /^http(s?):\/\//.test(val) || (val.includes('.') && !val.includes(' '));
        }
    </script>
</body>
</html>
