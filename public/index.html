<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atom</title>

  <!-- UV core scripts (keep these exactly as in your setup) -->
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/uv/sw.js", {
          scope: __uv$config.prefix || '/uv/',
        }).then(reg => console.log('SW registered', reg))
          .catch(err => console.error('SW registration failed', err));
      });
    }
  </script>

  <!-- Google Fonts for Orbitron (cyber title) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #05070f;
      --bg-card: rgba(15, 23, 42, 0.6);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --accent: #00f0ff;
      --accent-glow: rgba(0, 240, 255, 0.15);
      --accent-dark: #00b7d4;
      --border: #1e293b;
      --shadow: 0 8px 32px rgba(0, 240, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 15% 25%, var(--accent-glow) 0%, transparent 40%),
        radial-gradient(circle at 85% 75%, var(--accent-glow) 0%, transparent 45%);
      background-attachment: fixed;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      text-align: center;
      padding: 6rem 0 5rem;
      position: relative;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0, 240, 255, 0.06) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 700;
      background: linear-gradient(90deg, #00f0ff, #00d4ff, #00f0ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 100%;
      animation: titleGlow 10s ease-in-out infinite;
      letter-spacing: -0.08em;
      text-shadow: 0 0 60px var(--accent-glow);
    }

    @keyframes titleGlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .tagline {
      margin-top: 1.5rem;
      font-size: 1.4rem;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
    }

    .input-wrapper {
      margin: 5rem auto;
      max-width: 800px;
      position: relative;
    }

    input {
      width: 100%;
      padding: 1.5rem 2rem 1.5rem 5.5rem;
      font-size: 1.25rem;
      background: var(--bg-card);
      border: 1px solid rgba(0, 240, 255, 0.25);
      border-radius: 999px;
      color: var(--text);
      outline: none;
      transition: all 0.4s ease;
      backdrop-filter: blur(16px);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 5px var(--accent-glow), inset 0 2px 10px rgba(0,0,0,0.3);
    }

    .search-icon {
      position: absolute;
      left: 2rem;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      color: var(--text-dim);
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.75rem;
      margin: 6rem 0;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 20px;
      padding: 2.5rem 1.75rem;
      text-align: center;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      backdrop-filter: blur(16px);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle at 30% 70%, rgba(0, 240, 255, 0.08) 0%, transparent 70%);
      transition: all 0.8s ease;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-12px) scale(1.04);
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }

    .card:hover::before {
      transform: scale(1.4) rotate(5deg);
    }

    .card h3 {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      margin-bottom: 0.8rem;
      color: var(--accent);
      text-shadow: 0 0 15px var(--accent-glow);
    }

    .card p {
      color: var(--text-dim);
      font-size: 1rem;
      font-weight: 300;
    }

    .status {
      text-align: center;
      margin-top: 3rem;
      color: var(--accent);
      font-weight: 500;
      font-size: 1.25rem;
      opacity: 0;
      transition: opacity 0.5s;
      text-shadow: 0 0 10px var(--accent-glow);
    }

    .status.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Atom</h1>
      <p class="tagline">Pure. Unbound. Eternal.</p>
    </header>

    <div class="input-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="url" placeholder="Enter destination..." autocomplete="off">
    </div>

    <div class="quick-grid">
      <div class="card" onclick="quick('https://www.youtube.com')">
        <h3>YouTube</h3>
        <p>Unfiltered stream</p>
      </div>
      <div class="card" onclick="quick('https://piped.video')">
        <h3>Piped</h3>
        <p>Shadow mode video</p>
      </div>
      <div class="card" onclick="quick('https://sonic-mania-online.com')">
        <h3>Sonic Mania</h3>
        <p>Velocity unbound</p>
      </div>
      <!-- Add your own cards here -->
    </div>

    <div id="status" class="status"></div>
  </div>

  <script>
    // Your UV prefix (change if needed - check repo or console logs for correct value)
    const PROXY_PREFIX = '/uv/'; // ← adjust if your fork uses '/service/' or something else

    function showStatus(msg) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 5000);
    }

    function go() {
      let u = document.getElementById('url').value.trim();
      if (!u) return showStatus('Input required');
      if (!u.startsWith('http')) u = 'https://' + u;
      showStatus('Entering void...');
      window.open(PROXY_PREFIX + u, '_blank');
    }

    function quick(url) {
      showStatus('Jumping...');
      window.open(PROXY_PREFIX + url, '_blank');
    }

    // Auto-focus input on load
    document.getElementById('url').focus();

    // Optional: Enter key support
    document.getElementById('url').addEventListener('keypress', e => {
      if (e.key === 'Enter') go();
    });
  </script>
</body>
</html>
