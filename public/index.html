<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom | Cosmic Web</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- ATOM SPACE VARIABLES --- */
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --deep-space: #050a14;
            --glass-surface: rgba(20, 30, 50, 0.65);
            --glass-border: rgba(255, 255, 255, 0.15);
            --gloss-overlay: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.05) 40%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.1) 100%);
            --font-main: 'Segoe UI', 'Frutiger', sans-serif;
        }

        /* --- UNIVERSE RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); }

        body {
            height: 100vh;
            overflow: hidden;
            background: #000 url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        /* Ambient Space Overlay (Aurora/Nebula glow) */
        body::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 20% 80%, rgba(188, 19, 254, 0.2), transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(0, 243, 255, 0.15), transparent 50%);
            pointer-events: none; z-index: 1;
        }

        /* --- THE CORE (Main Container) --- */
        .atom-container {
            width: 100%; max-width: 750px;
            background: var(--glass-surface);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255,255,255,0.4);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            position: relative; z-index: 10;
            animation: float 6s ease-in-out infinite;
        }

        /* --- BRANDING --- */
        .logo-wrapper { margin-bottom: 35px; position: relative; display: inline-block; }
        
        .atom-logo {
            font-size: 60px; font-weight: 200; letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, #aadaff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            position: relative; z-index: 2;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }
        .atom-logo span { font-weight: 700; color: var(--neon-cyan); }

        /* The Spinning Orbit Ring */
        .orbit-ring {
            position: absolute; top: 50%; left: 50%;
            width: 140px; height: 40px;
            border: 2px solid rgba(0, 243, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(-20deg);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            animation: orbitSpin 8s linear infinite;
            pointer-events: none;
        }
        .orbit-ring::after {
            content: ''; position: absolute; top: 3px; left: 10px;
            width: 8px; height: 8px; background: white; border-radius: 50%;
            box-shadow: 0 0 10px white;
        }

        /* --- SEARCH HUD --- */
        .search-container { position: relative; margin-bottom: 40px; group; }
        
        .search-bar {
            width: 100%;
            padding: 20px 60px 20px 25px;
            font-size: 18px; color: white;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            outline: none; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .search-bar::placeholder { color: rgba(255,255,255,0.5); }
        
        .search-bar:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.2), inset 0 2px 10px rgba(0,0,0,0.3);
        }

        .go-btn {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            width: 48px; height: 48px;
            border-radius: 50%; border: none;
            background: linear-gradient(180deg, #00f3ff, #0078d7);
            color: white; font-size: 18px; cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            transition: 0.3s;
            overflow: hidden;
        }
        /* Button Gloss */
        .go-btn::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0));
            opacity: 0.6;
        }
        .go-btn:hover { transform: translateY(-50%) scale(1.1); filter: brightness(1.2); }

        /* --- APP GRID --- */
        .app-dock {
            display: flex; justify-content: center; gap: 25px; flex-wrap: wrap;
        }

        .app-item {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            cursor: pointer; transition: 0.3s;
        }
        .app-item:hover { transform: translateY(-8px); }
        
        .icon-glass {
            width: 64px; height: 64px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: white;
            position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        /* The "Frutiger" Shine */
        .icon-glass::after {
            content: ''; position: absolute; inset: 0;
            background: var(--gloss-overlay);
        }

        .app-name { font-size: 13px; font-weight: 500; letter-spacing: 0.5px; opacity: 0.8; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* Icon Specifics */
        .app-item:hover .icon-glass { border-color: var(--neon-cyan); box-shadow: 0 0 20px var(--neon-cyan); }
        .fa-discord { color: #5865F2; }
        .fa-youtube { color: #ff4444; }
        .fa-tiktok { color: #fe2c55; } /* Text shadow handles the white part */
        .fa-google { color: #4285F4; }

        /* --- STATUS BAR --- */
        .status-bar {
            margin-top: 40px; padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; color: rgba(255,255,255,0.5);
        }
        .status-pill {
            background: rgba(0, 255, 0, 0.1); border: 1px solid rgba(0, 255, 0, 0.3);
            padding: 4px 12px; border-radius: 20px; color: #4aff4a;
            display: flex; align-items: center; gap: 6px;
        }
        .blink { width: 6px; height: 6px; background: #4aff4a; border-radius: 50%; animation: blink 2s infinite; }

        /* --- ANIMATIONS --- */
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        @keyframes orbitSpin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; box-shadow: 0 0 5px #4aff4a; } 50% { opacity: 0.4; } }

    </style>
</head>
<body>

    <div class="atom-container">
        <!-- Logo -->
        <div class="logo-wrapper">
            <div class="orbit-ring"></div>
            <div class="atom-logo">Atom<span>OS</span></div>
        </div>

        <!-- Search / Proxy Input -->
        <form id="proxy-form" class="search-container">
            <input type="text" class="search-bar" id="uv-address" placeholder="Enter URL or Search Query..." autocomplete="off">
            <button type="submit" class="go-btn"><i class="fa-solid fa-rocket"></i></button>
        </form>

        <!-- Quick Launch -->
        <div class="app-dock">
            <div class="app-item" onclick="launch('https://discord.com')">
                <div class="icon-glass"><i class="fa-brands fa-discord"></i></div>
                <div class="app-name">Discord</div>
            </div>
            <div class="app-item" onclick="launch('https://youtube.com')">
                <div class="icon-glass"><i class="fa-brands fa-youtube"></i></div>
                <div class="app-name">YouTube</div>
            </div>
            <div class="app-item" onclick="launch('https://tiktok.com')">
                <div class="icon-glass"><i class="fa-brands fa-tiktok"></i></div>
                <div class="app-name">TikTok</div>
            </div>
            <div class="app-item" onclick="launch('https://google.com')">
                <div class="icon-glass"><i class="fa-brands fa-google"></i></div>
                <div class="app-name">Google</div>
            </div>
            <div class="app-item" onclick="launch('https://now.gg')">
                <div class="icon-glass"><i class="fa-solid fa-gamepad" style="color:var(--neon-purple)"></i></div>
                <div class="app-name">Now.gg</div>
            </div>
        </div>

        <!-- Footer Info -->
        <div class="status-bar">
            <div class="status-pill"><div class="blink"></div> Systems Nominal</div>
            <div>Ultraviolet v2.0 // Vercel Secure</div>
        </div>
    </div>

    <!-- 
       === ULTRAVIOLET SCRIPTS ===
       Ensure the 'uv' folder exists in your Vercel public/root directory 
    -->
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>

    <script>
        const form = document.getElementById('proxy-form');
        const input = document.getElementById('uv-address');

        // Check if UV is loaded
        const isUVLoaded = () => typeof Ultraviolet !== 'undefined';

        async function registerSW() {
            if (!navigator.serviceWorker) {
                throw new Error("Service Workers are not supported.");
            }
            await navigator.serviceWorker.register('/uv/sw.js', {
                scope: __uv$config.prefix
            });
        }

        async function launch(url) {
            // Visual feedback
            input.placeholder = "Initiating connection...";
            
            if(!isUVLoaded()) {
                console.warn("UV Scripts missing. Redirecting normally for demo.");
                window.location.href = url;
                return;
            }

            try {
                await registerSW();
            } catch (err) {
                console.error("SW Registration Failed", err);
            }

            let processedUrl = url.trim();
            if (!isUrl(processedUrl)) processedUrl = 'https://www.google.com/search?q=' + processedUrl;
            else if (!(processedUrl.startsWith('http://') || processedUrl.startsWith('https://'))) processedUrl = 'http://' + processedUrl;

            // Redirect via UV
            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(processedUrl);
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            await launch(input.value);
        });

        function isUrl(val = '') {
            if (/^http(s?):\/\//.test(val) || val.includes('.') && val.substr(0, 1) !== ' ') return true;
            return false;
        }
    </script>
</body>
</html>
