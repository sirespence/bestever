<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtomOS | Metro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- METRO / FRUTIGER METRO VARIABLES --- */
        :root {
            --metro-blue: #2d89ef;
            --metro-dark: #1d1d1d;
            --metro-purple: #603cba;
            --metro-green: #00a300;
            --metro-orange: #e3a21a;
            --metro-red: #ee1111;
            --glass-taskbar: rgba(0, 0, 0, 0.75);
            --font-light: 'Segoe UI Light', 'Segoe UI', sans-serif;
            --font-norm: 'Segoe UI', sans-serif;
        }

        * { box-sizing: border-box; user-select: none; outline: none; }
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            font-family: var(--font-norm);
            background: #0f0f0f url('https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
        }

        /* --- LOCK SCREEN --- */
        #lock-screen {
            position: fixed; inset: 0; z-index: 10000;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070') center/cover;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 50px;
            color: white; transition: transform 0.5s ease-in-out;
        }
        #lock-screen.slide-up { transform: translateY(-100%); }
        
        .lock-time { font-size: 90px; font-weight: 300; font-family: var(--font-light); line-height: 1; }
        .lock-date { font-size: 30px; font-weight: 300; margin-top: 10px; opacity: 0.9; }

        /* --- START SCREEN (TILES) --- */
        #start-screen {
            position: fixed; inset: 0; z-index: 9000;
            background: rgba(16, 16, 30, 0.95);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column; padding: 60px 80px;
            transform: scale(1.1) opacity(0); transition: 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            pointer-events: none; opacity: 0;
            overflow-x: auto;
        }
        #start-screen.active { transform: scale(1); opacity: 1; pointer-events: auto; }

        .start-header { color: white; font-size: 40px; font-family: var(--font-light); margin-bottom: 30px; }
        .user-block { position: absolute; top: 40px; right: 80px; display: flex; align-items: center; gap: 15px; color: white; cursor: pointer; }
        .user-img { width: 45px; height: 45px; background: #ddd; border-radius: 50%; }

        .tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; width: 100%; }
        
        .tile {
            height: 140px; position: relative; cursor: pointer;
            background: var(--metro-blue); color: white;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 10px;
            transition: transform 0.1s; border: 2px solid transparent;
        }
        .tile:hover { border-color: rgba(255,255,255,0.4); z-index: 2; transform: scale(1.02); }
        .tile:active { transform: scale(0.98); }
        .tile i { font-size: 40px; margin: auto; }
        .tile span { font-size: 14px; font-weight: 500; }
        
        /* Tile Colors */
        .tile.wide { grid-column: span 2; background: var(--metro-purple); }
        .tile.orange { background: var(--metro-orange); }
        .tile.green { background: var(--metro-green); }
        .tile.red { background: var(--metro-red); }

        /* --- DESKTOP --- */
        #desktop { position: absolute; inset: 0; z-index: 10; }
        
        /* --- WINDOWS (METRO AERO) --- */
        .window {
            position: absolute; background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            display: flex; flex-direction: column;
            border: 1px solid #2d89ef;
            opacity: 0; transform: scale(0.95); transition: 0.2s; visibility: hidden;
            min-width: 300px; min-height: 200px; resize: both; overflow: hidden;
        }
        .window.open { opacity: 1; transform: scale(1); visibility: visible; }
        .window.maximized { top:0!important; left:0!important; width:100%!important; height:calc(100% - 40px)!important; }

        .win-header {
            height: 32px; background: white; display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; cursor: default;
        }
        .win-title { font-size: 13px; font-weight: 600; text-transform: uppercase; color: #555; }
        .win-controls { display: flex; gap: 2px; height: 100%; }
        .win-btn { width: 34px; height: 100%; border: none; background: transparent; font-family: "Segoe UI Symbol"; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .win-btn:hover { background: #eee; }
        .btn-close:hover { background: #e81123; color: white; }

        .win-content { flex: 1; position: relative; background: #f0f0f0; border-top: 1px solid #ccc; }
        
        /* --- BROWSER SPECIFIC --- */
        .browser-bar { padding: 8px; background: #f2f2f2; display: flex; gap: 10px; border-bottom: 1px solid #ddd; }
        .url-input { flex: 1; padding: 5px 10px; border: 1px solid #a0a0a0; font-family: var(--font-norm); }
        .proxy-status { font-size: 11px; color: green; display: flex; align-items: center; gap: 5px; }

        /* --- TASKBAR --- */
        #taskbar {
            position: absolute; bottom: 0; width: 100%; height: 40px;
            background: var(--glass-taskbar); backdrop-filter: blur(10px);
            display: flex; align-items: center; z-index: 9999;
        }
        .start-btn {
            width: 48px; height: 100%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .start-btn:hover { background: rgba(255,255,255,0.1); }
        .start-btn i { color: white; font-size: 20px; }

        .task-list { display: flex; height: 100%; }
        .task-app {
            width: 48px; height: 100%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .task-app:hover { background: rgba(255,255,255,0.1); }
        .task-app.active { background: rgba(255,255,255,0.2); border-bottom: 3px solid var(--metro-blue); }
        .task-app img { width: 24px; height: 24px; }
        .task-app i { color: #fff; font-size: 20px; }

        #charms {
            position: fixed; top: 0; right: 0; bottom: 0; width: 100px;
            display: flex; flex-direction: column; justify-content: center; gap: 30px;
            background: rgba(0,0,0,0.9); z-index: 10001;
            transform: translateX(100%); transition: 0.2s; padding-left: 20px;
        }
        #charms.show { transform: translateX(0); }
        .charm-icon { color: white; font-size: 24px; cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .charm-icon:hover { opacity: 1; transform: scale(1.1); }

    </style>
</head>
<body onclick="checkActivity()">

    <!-- LOCK SCREEN -->
    <div id="lock-screen" onclick="unlock()">
        <div class="lock-time" id="lock-clock">12:00</div>
        <div class="lock-date" id="lock-date">Thursday, March 5</div>
        <div style="font-size:14px; margin-top:20px;">Click or Swipe Up to Unlock</div>
    </div>

    <!-- START SCREEN -->
    <div id="start-screen">
        <div class="user-block" onclick="Apps.open('settings')">
            <span id="username-display">User</span>
            <div class="user-img"></div>
        </div>
        <div class="start-header">Start</div>
        <div class="tile-grid">
            <div class="tile wide" onclick="Apps.open('browser')">
                <i class="fa-brands fa-edge"></i>
                <span>Edge Browser</span>
            </div>
            <div class="tile green" onclick="Apps.open('roblox')">
                <i class="fa-solid fa-gamepad"></i>
                <span>Roblox Cloud</span>
            </div>
            <div class="tile orange" onclick="Apps.open('explorer')">
                <i class="fa-solid fa-folder"></i>
                <span>File Explorer</span>
            </div>
            <div class="tile red" onclick="Apps.open('settings')">
                <i class="fa-solid fa-gear"></i>
                <span>PC Settings</span>
            </div>
            <div class="tile" onclick="Apps.open('notepad')">
                <i class="fa-solid fa-pen"></i>
                <span>Notepad</span>
            </div>
            <div class="tile" onclick="lock()">
                <i class="fa-solid fa-lock"></i>
                <span>Lock</span>
            </div>
        </div>
    </div>

    <!-- DESKTOP -->
    <div id="desktop"></div>

    <!-- TASKBAR -->
    <div id="taskbar">
        <div class="start-btn" onclick="toggleStart()">
            <i class="fa-brands fa-windows"></i>
        </div>
        <div class="task-list" id="task-list"></div>
        <div style="margin-left: auto; color: white; padding-right: 15px; font-size: 13px;" id="task-clock">12:00 PM</div>
    </div>

    <!-- CHARMS BAR -->
    <div id="charms">
        <i class="fa-solid fa-magnifying-glass charm-icon"></i>
        <i class="fa-brands fa-windows charm-icon" onclick="toggleStart()"></i>
        <i class="fa-solid fa-gear charm-icon" onclick="Apps.open('settings')"></i>
    </div>

    <script>
        // --- SYSTEM CONFIG ---
        const System = {
            proxies: [
                "https://tomp.app/", // Common public proxy
                "https://cdn.incognito.wiki/",
                "https://ludicrous.icu/",
                "https://search.brave.com/search?q=" // Fallback
            ],
            data: {
                username: "Administrator",
                files: { 'welcome.txt': 'Welcome to AtomOS Metro Edition.' }
            }
        };

        // --- CLOCK & LOCK ---
        function updateTime() {
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const date = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
            document.getElementById('lock-clock').innerText = time.replace(/\s[AP]M/, '');
            document.getElementById('lock-date').innerText = date;
            document.getElementById('task-clock').innerText = time;
        }
        setInterval(updateTime, 1000);
        updateTime();

        function unlock() {
            document.getElementById('lock-screen').classList.add('slide-up');
            // Show start screen on first unlock
            if(!document.getElementById('start-screen').classList.contains('active')) {
                toggleStart();
            }
        }
        function lock() {
            document.getElementById('lock-screen').classList.remove('slide-up');
            document.getElementById('start-screen').classList.remove('active');
        }

        // --- WINDOW MANAGER ---
        const WM = {
            zIndex: 100,
            open: function(id, title, content) {
                if(document.getElementById('win-'+id)) return WM.focus(id);
                
                // Close Start if open
                document.getElementById('start-screen').classList.remove('active');

                const win = document.createElement('div');
                win.className = 'window open';
                win.id = 'win-'+id;
                win.style.width = '800px';
                win.style.height = '600px';
                win.style.left = (50 + Math.random()*50) + 'px';
                win.style.top = (50 + Math.random()*50) + 'px';
                win.style.zIndex = ++this.zIndex;

                win.innerHTML = `
                    <div class="win-header" onmousedown="WM.dragStart(event, '${id}')">
                        <div class="win-title">${title}</div>
                        <div class="win-controls">
                            <div class="win-btn" onclick="WM.minimize('${id}')">_</div>
                            <div class="win-btn" onclick="WM.maximize('${id}')">◻</div>
                            <div class="win-btn btn-close" onclick="WM.close('${id}')">✕</div>
                        </div>
                    </div>
                    <div class="win-content">${content}</div>
                `;
                
                win.addEventListener('mousedown', () => WM.focus(id));
                document.getElementById('desktop').appendChild(win);
                this.addTask(id, title);
            },
            close: function(id) {
                document.getElementById('win-'+id).remove();
                document.getElementById('task-'+id).remove();
            },
            focus: function(id) {
                const win = document.getElementById('win-'+id);
                if(win) win.style.zIndex = ++this.zIndex;
                
                document.querySelectorAll('.task-app').forEach(t => t.classList.remove('active'));
                document.getElementById('task-'+id)?.classList.add('active');
            },
            maximize: function(id) {
                document.getElementById('win-'+id).classList.toggle('maximized');
            },
            minimize: function(id) {
                document.getElementById('win-'+id).classList.remove('open');
                document.getElementById('task-'+id).classList.remove('active');
            },
            addTask: function(id, title) {
                const iconMap = {
                    'browser': 'fa-edge',
                    'roblox': 'fa-gamepad',
                    'explorer': 'fa-folder',
                    'settings': 'fa-gear',
                    'notepad': 'fa-pen'
                };
                const task = document.createElement('div');
                task.className = 'task-app active';
                task.id = 'task-'+id;
                task.innerHTML = `<i class="fa-brands ${iconMap[id] || 'fa-window-maximize'}"></i>`;
                task.onclick = () => {
                    const win = document.getElementById('win-'+id);
                    if(!win.classList.contains('open')) {
                        win.classList.add('open');
                        WM.focus(id);
                    } else {
                        WM.focus(id);
                    }
                };
                document.getElementById('task-list').appendChild(task);
            },
            dragStart: function(e, id) {
                if(e.target.closest('.win-controls')) return;
                const win = document.getElementById('win-'+id);
                WM.focus(id);
                let shiftX = e.clientX - win.getBoundingClientRect().left;
                let shiftY = e.clientY - win.getBoundingClientRect().top;
                
                function move(e) {
                    win.style.left = e.pageX - shiftX + 'px';
                    win.style.top = e.pageY - shiftY + 'px';
                }
                function stop() {
                    document.removeEventListener('mousemove', move);
                    document.removeEventListener('mouseup', stop);
                }
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', stop);
            }
        };

        // --- APPS ---
        const Apps = {
            open: function(app) {
                switch(app) {
                    case 'browser':
                        WM.open('browser', 'Internet', `
                            <div style="display:flex; flex-direction:column; height:100%;">
                                <div class="browser-bar">
                                    <button onclick="Browser.back()">Back</button>
                                    <button onclick="Browser.reload()">Reload</button>
                                    <input type="text" id="url-bar" class="url-input" value="https://bing.com" onkeydown="if(event.key=='Enter') Browser.go()">
                                    <button onclick="Browser.go()">Go</button>
                                </div>
                                <div style="padding:5px; background:#e1e1e1; font-size:11px; display:flex; justify-content:space-between;">
                                    <span>Proxy Mode: Auto-Detect</span>
                                    <span style="cursor:pointer; color:blue;" onclick="Browser.tryNextProxy()">Try Next Proxy Server</span>
                                </div>
                                <iframe id="browser-frame" src="https://bing.com" style="flex:1; background:white;"></iframe>
                            </div>
                        `);
                        break;
                    case 'roblox':
                         WM.open('roblox', 'Roblox', `
                            <div style="height:100%; display:flex; flex-direction:column;">
                                <div style="background:#000; color:white; padding:5px; font-size:12px;">Cloud Gaming Wrapper Active</div>
                                <iframe src="https://www.easyfun.gg/games/roblox.html"></iframe>
                            </div>
                         `);
                         break;
                    case 'explorer':
                        let fileHtml = '';
                        for(let f in System.data.files) {
                            fileHtml += `<div style="padding:10px; float:left; width:80px; text-align:center; cursor:pointer;" onclick="alert('${System.data.files[f]}')">
                                <i class="fa-solid fa-file-lines" style="font-size:30px; color:#2d89ef;"></i><br><span style="font-size:12px;">${f}</span>
                            </div>`;
                        }
                        WM.open('explorer', 'File Explorer', `<div style="padding:10px;">${fileHtml}</div>`);
                        break;
                    case 'settings':
                        WM.open('settings', 'PC Settings', `
                            <div style="padding:20px;">
                                <h2>Personalize</h2>
                                <p>Wallpaper URL:</p>
                                <input type="text" style="width:100%; padding:5px;" onchange="document.body.style.backgroundImage = 'url('+this.value+')'">
                                <br><br>
                                <button onclick="localStorage.clear(); location.reload();" style="background:red; color:white; border:none; padding:10px;">Reset PC</button>
                            </div>
                        `);
                        break;
                    case 'notepad':
                        WM.open('notepad', 'Notepad', `
                            <textarea style="width:100%; height:100%; border:none; padding:10px; font-family:monospace; resize:none;">Type here...</textarea>
                        `);
                        break;
                }
            }
        };

        // --- BROWSER LOGIC (The "Fix") ---
        const Browser = {
            currentProxyIndex: 0,
            
            go: function() {
                const val = document.getElementById('url-bar').value;
                const frame = document.getElementById('browser-frame');
                
                // Check if user is trying a blocked site directly
                if(val.includes('google.com') || val.includes('youtube.com')) {
                    if(confirm("Direct access to Google/YouTube is blocked by headers. Use Proxy Mode?")) {
                        this.loadViaProxy(val);
                    } else {
                        frame.src = val; // Will likely fail
                    }
                } else if (!val.startsWith('http')) {
                    // Search
                    frame.src = "https://www.bing.com/search?q=" + encodeURIComponent(val);
                } else {
                    frame.src = val;
                }
            },
            
            loadViaProxy: function(url) {
                const proxy = System.proxies[this.currentProxyIndex];
                const frame = document.getElementById('browser-frame');
                
                // Simple logic: Load the proxy homepage so user can surf inside it
                // Or try to append if the proxy supports standard UV formatting (complex to guess)
                frame.src = proxy;
                alert("Loading via Proxy Node " + (this.currentProxyIndex+1) + ".\nType your destination INSIDE the loaded website.");
            },
            
            tryNextProxy: function() {
                this.currentProxyIndex = (this.currentProxyIndex + 1) % System.proxies.length;
                this.loadViaProxy();
            },

            back: () => document.getElementById('browser-frame').contentWindow.history.back(),
            reload: () => document.getElementById('browser-frame').contentWindow.location.reload()
        };

        // --- UI TOGGLES ---
        function toggleStart() {
            document.getElementById('start-screen').classList.toggle('active');
        }
        
        // Charms Bar Trigger (Mouse Right Edge)
        document.addEventListener('mousemove', (e) => {
            const charms = document.getElementById('charms');
            if(window.innerWidth - e.clientX < 20) {
                charms.classList.add('show');
            } else if (window.innerWidth - e.clientX > 120) {
                charms.classList.remove('show');
            }
        });

    </script>
</body>
</html>
