<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATOM</title>
    
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js", { scope: __uv$config.prefix });
            });
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --accent: #00ffcc;
            --secondary: #0088ff;
            --glass: rgba(10, 10, 15, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Animated Starfield */
        .starfield {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }
        @keyframes twinkle {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1); opacity: var(--opacity); }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Main Interface Card */
        .card {
            width: 500px;
            padding: 50px;
            background: var(--glass);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 0 80px rgba(0, 255, 204, 0.05), inset 0 0 0 1px rgba(255,255,255,0.05);
            text-align: center;
            opacity: 0;
            transform: scale(0.95);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s;
        }

        @keyframes cardEntrance {
            to { opacity: 1; transform: scale(1); }
        }

        /* Typography */
        h1 {
            font-size: 5rem; margin: 0; line-height: 1;
            font-weight: 800; letter-spacing: -4px;
            background: linear-gradient(135deg, #fff 0%, #a5a5a5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .status {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 4px;
            color: var(--accent); margin-bottom: 40px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .status::before {
            content: ''; width: 8px; height: 8px; background: var(--accent);
            border-radius: 50%; box-shadow: 0 0 10px var(--accent);
        }

        /* Input Field */
        .input-group { position: relative; width: 100%; margin-bottom: 30px; }
        
        input {
            width: 100%; padding: 20px 25px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: #fff; font-size: 1.2rem;
            outline: none; transition: 0.3s;
            box-sizing: border-box; font-family: 'Inter', sans-serif;
        }
        input:focus {
            background: rgba(255,255,255,0.07);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.1);
        }

        /* Buttons */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        button {
            padding: 20px; border: none; border-radius: 16px;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-launch {
            background: #fff; color: #000;
        }
        .btn-launch:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,255,255,0.2); }

        .btn-roblox {
            background: linear-gradient(135deg, #00ffcc 0%, #0088ff 100%);
            color: #000;
        }
        .btn-roblox:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 200, 255, 0.3); }

        /* Portal / Iframe */
        #portal {
            position: fixed; inset: 0; z-index: 100;
            background: #000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
            display: flex; flex-direction: column;
        }
        #portal.active { opacity: 1; pointer-events: auto; }

        iframe {
            flex: 1; width: 100%; height: 100%; border: none;
            background: #111;
        }

        .bar {
            height: 50px; background: #0a0a0f; border-bottom: 1px solid #333;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }
        .bar-title { font-size: 0.9rem; color: #666; font-weight: 600; }
        .close {
            color: #fff; background: rgba(255,255,255,0.1);
            padding: 8px 16px; border-radius: 8px; font-size: 0.8rem;
            cursor: pointer; transition: 0.2s;
        }
        .close:hover { background: #ff3333; }

    </style>
</head>
<body>

    <div class="starfield" id="stars"></div>

    <div class="card">
        <h1>atom</h1>
        <div class="status">System Online /// Ready</div>

        <div class="input-group">
            <input type="text" id="input" placeholder="Search Brave or type a URL..." autocomplete="off">
        </div>

        <div class="grid">
            <!-- GeForce Now is the only reliable non-now.gg way to play browser Roblox -->
            <button class="btn-roblox" onclick="load('https://play.geforcenow.com/mall/')">Roblox (GFN)</button>
            <button class="btn-launch" onclick="load(document.getElementById('input').value)">Launch</button>
        </div>
    </div>

    <div id="portal">
        <div class="bar">
            <span class="bar-title">ATOM BROWSER // ENCRYPTED</span>
            <div class="close" onclick="shut()">CLOSE SESSION</div>
        </div>
        <iframe id="frame"></iframe>
    </div>

    <script>
        // Star Generation
        const stars = document.getElementById('stars');
        for(let i=0; i<100; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            let size = Math.random() * 3;
            s.style.width = size + 'px';
            s.style.height = size + 'px';
            s.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            s.style.setProperty('--opacity', Math.random());
            s.style.animationDelay = Math.random() * 5 + 's';
            stars.appendChild(s);
        }

        const portal = document.getElementById('portal');
        const frame = document.getElementById('frame');
        const input = document.getElementById('input');

        function load(val) {
            let url = val.trim();
            if(!url) return;

            // Brave Search Logic
            if (!url.includes('.') && !url.includes('://')) {
                url = 'https://search.brave.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            portal.classList.add('active');
            
            // Register service worker if missing, then load
            if(!navigator.serviceWorker.controller) {
                navigator.serviceWorker.register("/uv/sw.js", { scope: __uv$config.prefix })
                .then(() => {
                    frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
                });
            } else {
                frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
            }
        }

        function shut() {
            portal.classList.remove('active');
            setTimeout(() => frame.src = 'about:blank', 500);
        }

        input.addEventListener('keydown', e => {
            if(e.key === 'Enter') load(input.value);
        });
    </script>
</body>
</html>
