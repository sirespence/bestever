<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATOM | starlight ⚛️</title>
    
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js", { scope: __uv$config.prefix });
            });
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glow: #7000ff;
            --cyber: #00ffff;
            --hot: #ff00ff;
            --dark: #020205;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--dark);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
        }

        /* animated starlight background */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -1;
        }

        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 50px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo { font-family: 'Syncopate'; font-size: 1.8rem; background: linear-gradient(45deg, var(--cyber), var(--glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .tabs { display: flex; gap: 40px; }
        .tab { cursor: pointer; text-transform: uppercase; font-weight: 700; letter-spacing: 2px; opacity: 0.6; transition: 0.3s; }
        .tab:hover, .tab.active { opacity: 1; color: var(--cyber); text-shadow: 0 0 10px var(--cyber); }

        .container { height: calc(100vh - 80px); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }

        /* ultra-luxe search bar */
        .search-box {
            width: 80%; max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(112, 0, 255, 0.3);
            border-radius: 20px;
            display: flex; padding: 10px;
            box-shadow: 0 0 50px rgba(112, 0, 255, 0.2);
        }

        input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 1.2rem; padding: 15px; font-family: 'Space Grotesk'; }
        
        button#go {
            background: linear-gradient(45deg, var(--glow), var(--hot));
            border: none; color: white; padding: 0 40px; border-radius: 15px;
            font-weight: 900; cursor: pointer; transition: 0.3s;
        }

        button#go:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--hot); }

        /* game launcher grid */
        .arcade-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px; width: 85%; max-width: 1200px; display: none;
        }

        .launcher-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; text-align: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; position: relative; overflow: hidden;
        }

        .launcher-card:hover {
            background: rgba(112, 0, 255, 0.15);
            border-color: var(--cyber);
            transform: translateY(-10px) scale(1.02);
        }

        .launcher-card.roblox-special {
            border: 2px solid var(--cyber);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }

        .badge {
            position: absolute; top: 15px; right: 15px;
            background: var(--cyber); color: #000;
            padding: 5px 12px; border-radius: 10px; font-size: 0.6rem; font-weight: 900;
        }

        /* viewport */
        #viewport { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; display: none; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .exit-ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1001; background: rgba(0,0,0,0.8); padding: 10px 30px; border-radius: 50px; border: 1px solid var(--hot); cursor: pointer; font-weight: 900; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <nav>
        <div class="logo">ATOM</div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('home')">Nexus</div>
            <div class="tab" onclick="switchTab('arcade')">Arcade</div>
        </div>
    </nav>

    <div id="home" class="container">
        <h1 style="font-size: 3.5rem; margin-bottom: 10px; letter-spacing: -2px;">SPLIT THE <span style="color:var(--cyber)">ATOM</span>.</h1>
        <p style="opacity: 0.5; margin-bottom: 40px;">unfiltered access to the stargazing coordinates.</p>
        <div class="search-box">
            <input type="text" id="urlInput" placeholder="search the galaxy or enter a destination...">
            <button id="go">LAUNCH</button>
        </div>
    </div>

    <div id="arcade" class="container" style="display:none;">
        <div class="arcade-grid" id="grid">
            <div class="launcher-card roblox-special" onclick="launchMobileRoblox()">
                <div class="badge">MOBILE EMULATOR</div>
                <div style="font-size: 50px;">🎮</div>
                <h2 style="margin: 15px 0 5px;">ROBLOX</h2>
                <p style="opacity: 0.6;">optimized cloud launcher (now.gg mirror)</p>
            </div>

            <div class="launcher-card" onclick="openUrl('https://supermario-game.com/')">
                <div style="font-size: 50px;">🍄</div>
                <h2>MARIO</h2>
                <p style="opacity: 0.6;">classic 64-bit nostalgia</p>
            </div>

            <div class="launcher-card" onclick="openUrl('https://sonic-js.com/')">
                <div style="font-size: 50px;">🦔</div>
                <h2>SONIC</h2>
                <p style="opacity: 0.6;">unlocked speed engine</p>
            </div>
        </div>
    </div>

    <div id="viewport">
        <iframe id="mainFrame"></iframe>
        <div class="exit-ui" onclick="exitVp()">CLOSE SESSION ⚡</div>
    </div>

    <script>
        const frame = document.getElementById('mainFrame');
        const vp = document.getElementById('viewport');

        function switchTab(id) {
            document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).style.display = 'flex';
            if(id === 'arcade') document.getElementById('grid').style.display = 'grid';
            event.currentTarget.classList.add('active');
        }

        function openUrl(val) {
            let url = val.trim();
            if (!url.includes('.')) {
                url = 'https://search.brave.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
            vp.style.display = 'block';
        }

        // the "better" roblox mobile-style launcher logic
        function launchMobileRoblox() {
            // we use a specific cloud-node link that triggers the web-mobile client
            const mobileRoblox = "https://now.gg/apps/roblox-corporation/5349/roblox.html";
            openUrl(mobileRoblox);
        }

        document.getElementById('go').onclick = () => openUrl(document.getElementById('urlInput').value);
        document.getElementById('urlInput').onkeydown = (e) => { if(e.key === 'Enter') document.getElementById('go').click(); };

        function exitVp() {
            vp.style.display = 'none';
            frame.src = 'about:blank';
        }
    </script>
</body>
</html>
