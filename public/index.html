<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atom os | aero</title>
    
    <!-- uv proxy scripts -->
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js", { scope: __uv$config.prefix });
            });
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600&display=swap');

        :root {
            --glass: rgba(240, 250, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --taskbar: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(200,225,255,0.9) 100%);
            --aero-blue: #23a6d5;
            --aero-green: #23d5ab;
        }

        * { box-sizing: border-box; user-select: none; }

        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #0099ff, #ffffff, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            cursor: default;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* desktop icons grid */
        .desktop {
            padding: 20px;
            display: flex; flex-direction: column; gap: 20px; flex-wrap: wrap;
            height: calc(100% - 50px); align-content: flex-start;
        }

        .icon {
            width: 80px; display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: 0.2s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
            color: white;
        }
        .icon:hover { transform: scale(1.05); }
        .icon:active { transform: scale(0.95); opacity: 0.8; }

        .icon-img {
            width: 48px; height: 48px;
            background: linear-gradient(180deg, #ffffff 0%, #cceeff 100%);
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; border: 1px solid rgba(255,255,255,0.6);
            position: relative; overflow: hidden;
        }
        
        /* icon gloss */
        .icon-img::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
        }

        .icon-label { margin-top: 8px; font-size: 0.85rem; text-align: center; font-weight: 500; }

        /* window system */
        .window {
            position: absolute; top: 10%; left: 15%;
            width: 800px; height: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.9);
            display: flex; flex-direction: column;
            opacity: 0; transform: scale(0.95);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none; visibility: hidden;
            z-index: 10; resize: both; overflow: hidden;
        }

        .window.active {
            opacity: 1; transform: scale(1);
            pointer-events: auto; visibility: visible;
        }

        .title-bar {
            height: 35px;
            background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(230,240,255,0.5) 100%);
            border-bottom: 1px solid rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; cursor: move;
        }

        .win-title { font-size: 0.85rem; color: #445566; font-weight: 600; text-transform: lowercase; }

        .win-controls { display: flex; gap: 6px; }
        .win-btn {
            width: 12px; height: 12px; border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.1); cursor: pointer;
        }
        .close-btn { background: #ff5f56; }
        .min-btn { background: #ffbd2e; }
        .max-btn { background: #27c93f; }

        .window-content { flex: 1; position: relative; background: rgba(255,255,255,0.5); }
        iframe { width: 100%; height: 100%; border: none; }

        /* taskbar */
        .taskbar {
            position: absolute; bottom: 0; width: 100%; height: 45px;
            background: var(--taskbar);
            border-top: 1px solid rgba(255,255,255,0.6);
            display: flex; align-items: center; padding: 0 10px; gap: 10px;
            backdrop-filter: blur(10px); z-index: 1000;
        }

        .start-btn {
            width: 35px; height: 35px;
            background: radial-gradient(circle at 50% 50%, #00d2ff 0%, #0077ff 100%);
            border-radius: 50%; border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer; transition: 0.2s;
        }
        .start-btn:hover { filter: brightness(1.2); box-shadow: 0 0 10px #00d2ff; }

        .task-item {
            padding: 5px 15px; background: rgba(255,255,255,0.4);
            border-radius: 6px; font-size: 0.8rem; color: #333;
            cursor: pointer; border: 1px solid transparent;
        }
        .task-item:hover { background: rgba(255,255,255,0.7); border-color: #fff; }

        .clock { margin-left: auto; color: #333; font-size: 0.85rem; padding-right: 10px; }

        /* specific app styling */
        .browser-bar {
            padding: 8px; display: flex; gap: 10px;
            background: #f0f5f9; border-bottom: 1px solid #dceef7;
        }
        .url-input {
            flex: 1; padding: 6px 12px; border-radius: 15px;
            border: 1px solid #bdc7d0; outline: none;
            font-size: 0.9rem; color: #444;
        }

        .app-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            padding: 20px; gap: 20px;
        }
        .app-card {
            background: rgba(255,255,255,0.6);
            border-radius: 10px; padding: 10px;
            text-align: center; cursor: pointer;
            transition: 0.2s; border: 1px solid transparent;
        }
        .app-card:hover { background: #fff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

    </style>
</head>
<body>

    <!-- Desktop Icons -->
    <div class="desktop">
        <div class="icon" onclick="openWindow('browser')">
            <div class="icon-img">🌐</div>
            <div class="icon-label">net</div>
        </div>
        <div class="icon" onclick="launchRoblox()">
            <div class="icon-img" style="background: linear-gradient(180deg, #ff6b6b 0%, #ee0000 100%);">R</div>
            <div class="icon-label">roblox</div>
        </div>
        <div class="icon" onclick="openWindow('library')">
            <div class="icon-img" style="background: linear-gradient(180deg, #aaddaa 0%, #55aa55 100%);">🎮</div>
            <div class="icon-label">library</div>
        </div>
        <div class="icon" onclick="alert('vibes are currently optimized.')">
            <div class="icon-img" style="background: linear-gradient(180deg, #ddccff 0%, #8855ff 100%);">⚙️</div>
            <div class="icon-label">vibes</div>
        </div>
    </div>

    <!-- Browser Window -->
    <div class="window" id="win-browser">
        <div class="title-bar" onmousedown="startDrag(event, 'win-browser')">
            <div class="win-title">atom browser</div>
            <div class="win-controls">
                <div class="win-btn min-btn"></div>
                <div class="win-btn max-btn"></div>
                <div class="win-btn close-btn" onclick="closeWindow('browser')"></div>
            </div>
        </div>
        <div class="window-content" style="display:flex; flex-direction:column;">
            <div class="browser-bar">
                <input type="text" class="url-input" id="url-bar" placeholder="search brave or enter url..." onkeydown="if(event.key==='Enter') navigate(this.value)">
            </div>
            <iframe id="browser-frame" src="about:blank"></iframe>
        </div>
    </div>

    <!-- Games Library Window -->
    <div class="window" id="win-library" style="width: 600px; height: 400px; left: 30%; top: 20%;">
        <div class="title-bar" onmousedown="startDrag(event, 'win-library')">
            <div class="win-title">app library</div>
            <div class="win-controls">
                <div class="win-btn close-btn" onclick="closeWindow('library')"></div>
            </div>
        </div>
        <div class="window-content" style="overflow-y: auto;">
            <div class="app-grid">
                <div class="app-card" onclick="launchRoblox()">
                    <div style="font-size:30px">🟥</div>
                    <div style="font-size:0.8rem; margin-top:5px;">roblox</div>
                </div>
                <div class="app-card" onclick="openGame('https://minecraft.js.org')">
                    <div style="font-size:30px">🟩</div>
                    <div style="font-size:0.8rem; margin-top:5px;">minecraft</div>
                </div>
                <div class="app-card" onclick="openGame('https://poki.com')">
                    <div style="font-size:30px">🕹️</div>
                    <div style="font-size:0.8rem; margin-top:5px;">poki</div>
                </div>
                <div class="app-card" onclick="openGame('https://discord.com/app')">
                    <div style="font-size:30px">💬</div>
                    <div style="font-size:0.8rem; margin-top:5px;">discord</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <div class="start-btn" onclick="toggleMenu()"></div>
        <div class="task-item" onclick="openWindow('browser')">atom browser</div>
        <div class="clock" id="clock">12:00</div>
    </div>

    <script>
        // 1. Time
        function updateClock() {
            const now = new Date();
            const hours = now.getHours() > 12 ? now.getHours() - 12 : now.getHours();
            const mins = now.getMinutes().toString().padStart(2, '0');
            const ampm = now.getHours() >= 12 ? 'pm' : 'am';
            document.getElementById('clock').innerText = `${hours || 12}:${mins} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Window Management
        let zIndex = 100;

        function openWindow(id) {
            const win = document.getElementById('win-' + id);
            win.classList.add('active');
            win.style.zIndex = ++zIndex;
        }

        function closeWindow(id) {
            const win = document.getElementById('win-' + id);
            win.classList.remove('active');
            // reset iframe to stop audio
            const frames = win.getElementsByTagName('iframe');
            if(frames.length > 0) frames[0].src = 'about:blank';
        }

        function bringToFront(win) {
            win.style.zIndex = ++zIndex;
        }

        // 3. Browser Logic
        function navigate(val) {
            const frame = document.getElementById('browser-frame');
            let url = val.trim();
            if (!url) return;
            if (!url.includes('.') && !url.includes('://')) {
                url = 'https://search.brave.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            
            if ("serviceWorker" in navigator && navigator.serviceWorker.controller) {
                frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
            } else {
                // simple fallback if sw not ready yet
                navigator.serviceWorker.register("/uv/sw.js", { scope: __uv$config.prefix }).then(() => {
                     frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
                });
            }
        }

        // 4. Game Logic
        function launchRoblox() {
            openWindow('browser');
            // Using EasyFun.gg as the current best unblocked cloud method
            document.getElementById('url-bar').value = 'loading cloud...';
            navigate('https://www.easyfun.gg/games/roblox.html');
        }

        function openGame(url) {
            openWindow('browser');
            navigate(url);
        }

        // 5. Draggable Windows
        let isDragging = false;
        let currentWindow = null;
        let offset = { x: 0, y: 0 };

        function startDrag(e, winId) {
            isDragging = true;
            currentWindow = document.getElementById(winId);
            bringToFront(currentWindow);
            
            const rect = currentWindow.getBoundingClientRect();
            offset.x = e.clientX - rect.left;
            offset.y = e.clientY - rect.top;
            
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', stopDrag);
        }

        function onDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            currentWindow.style.left = (e.clientX - offset.x) + 'px';
            currentWindow.style.top = (e.clientY - offset.y) + 'px';
        }

        function stopDrag() {
            isDragging = false;
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        // 6. Simple Start Menu
        function toggleMenu() {
            // Placeholder for start menu animation
            const btn = document.querySelector('.start-btn');
            btn.style.transform = 'scale(0.9)';
            setTimeout(() => btn.style.transform = 'scale(1)', 150);
        }

    </script>
</body>
</html>
