<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATOM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<style>

:root {
  --ink:    #030810;
  --rim:    rgba(100,180,255,0.18);
  --rim-hi: rgba(180,225,255,0.48);
  --shine:  rgba(255,255,255,0.22);
  --blue:   #5bc8ff;
  --teal:   #2affcc;
  --white:  #eef6ff;
  --dim:    rgba(190,220,255,0.45);
  --danger: #ff3c5a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--ink);
  color: var(--white);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── SPACE ── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 140% 65% at 50% -8%,  rgba(8,55,130,0.75)  0%, transparent 55%),
    radial-gradient(ellipse 55%  55% at 0%   55%,  rgba(4,25,72,0.55)   0%, transparent 50%),
    radial-gradient(ellipse 40%  40% at 98%  78%,  rgba(8,38,90,0.4)    0%, transparent 50%),
    radial-gradient(ellipse 30%  30% at 78%  8%,   rgba(0,88,188,0.3)   0%, transparent 45%);
  pointer-events: none;
}
.stars {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(1px   1px   at  6%  9%,  rgba(215,238,255,.9)  0,transparent 1px),
    radial-gradient(1px   1px   at 14% 31%,  rgba(200,228,255,.55) 0,transparent 1px),
    radial-gradient(1.5px 1.5px at 23%  4%,  rgba(240,250,255,1)   0,transparent 1px),
    radial-gradient(1px   1px   at 32% 57%,  rgba(200,228,255,.6)  0,transparent 1px),
    radial-gradient(1px   1px   at 39% 20%,  rgba(200,228,255,.5)  0,transparent 1px),
    radial-gradient(1px   1px   at 48% 83%,  rgba(215,238,255,.5)  0,transparent 1px),
    radial-gradient(1px   1px   at 54%  7%,  rgba(235,248,255,.8)  0,transparent 1px),
    radial-gradient(1px   1px   at 60% 45%,  rgba(200,228,255,.55) 0,transparent 1px),
    radial-gradient(1.5px 1.5px at 67% 73%,  rgba(235,248,255,.85) 0,transparent 1px),
    radial-gradient(1px   1px   at 74% 24%,  rgba(200,228,255,.5)  0,transparent 1px),
    radial-gradient(1px   1px   at 81% 90%,  rgba(200,228,255,.6)  0,transparent 1px),
    radial-gradient(1px   1px   at 88% 38%,  rgba(220,242,255,.7)  0,transparent 1px),
    radial-gradient(1px   1px   at 94% 63%,  rgba(200,228,255,.5)  0,transparent 1px),
    radial-gradient(1px   1px   at 98% 16%,  rgba(235,248,255,.65) 0,transparent 1px),
    radial-gradient(1px   1px   at  2% 77%,  rgba(200,228,255,.5)  0,transparent 1px),
    radial-gradient(1.5px 1.5px at 44% 52%,  rgba(240,250,255,.95) 0,transparent 1px),
    radial-gradient(1px   1px   at 57% 29%,  rgba(200,228,255,.5)  0,transparent 1px),
    radial-gradient(1px   1px   at 71% 11%,  rgba(220,240,255,.65) 0,transparent 1px);
}

.shell {
  position: relative; z-index: 10;
  height: 100vh;
  display: flex; flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  flex-shrink: 0; height: 56px;
  display: flex; align-items: center;
  padding: 0 18px; gap: 14px;
  background: linear-gradient(180deg,
    rgba(255,255,255,0.19) 0%,
    rgba(255,255,255,0.08) 44%,
    rgba(4,16,44,0.78)    100%
  );
  border-bottom: 1px solid var(--rim);
  box-shadow: inset 0 1px 0 var(--shine), 0 3px 18px rgba(0,0,0,0.55);
  backdrop-filter: blur(22px);
}

.logo {
  font-size: 19px; font-weight: 900; letter-spacing: 5px;
  background: linear-gradient(140deg, #fff 20%, #7dd8ff 58%, #2affcc 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 10px rgba(80,200,255,0.5));
  flex-shrink: 0;
}

.tb-div {
  width: 1px; height: 26px;
  background: linear-gradient(180deg, transparent, var(--rim-hi), transparent);
  flex-shrink: 0;
}

/* address bar */
.addr-wrap { flex: 1; max-width: 520px; position: relative; }
.addr-input {
  width: 100%;
  background: linear-gradient(180deg, rgba(0,6,22,0.86) 0%, rgba(2,12,36,0.72) 100%);
  border: 1px solid rgba(70,140,225,0.3);
  border-top-color: rgba(10,38,100,0.9);
  border-radius: 9px;
  padding: 8px 38px 8px 14px;
  color: var(--white);
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 500;
  box-shadow:
    inset 0 2px 5px rgba(0,0,0,0.62),
    0 1px 0 rgba(255,255,255,0.07);
  transition: border-color .2s, box-shadow .2s;
}
.addr-input::placeholder { color: rgba(130,180,228,0.36); }
.addr-input:focus {
  outline: none;
  border-color: rgba(91,200,255,0.55);
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.62), 0 0 0 2px rgba(91,200,255,0.13);
}
.addr-go {
  position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
  width: 27px; height: 23px;
  background: linear-gradient(180deg, rgba(91,200,255,0.36) 0%, rgba(28,105,210,0.55) 100%);
  border: 1px solid rgba(120,200,255,0.38);
  border-top-color: rgba(200,240,255,0.38);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #c0e8ff; font-size: 12px; cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 1px 4px rgba(0,0,0,0.5);
  transition: all .15s;
}
.addr-go:hover {
  background: linear-gradient(180deg, rgba(120,220,255,0.55) 0%, rgba(48,138,232,0.75) 100%);
  color: #fff;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 0 10px rgba(91,200,255,0.35);
}

/* status pill */
.status-pill {
  margin-left: auto;
  display: flex; align-items: center; gap: 7px;
  background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.03) 100%);
  border: 1px solid var(--rim);
  border-top-color: rgba(255,255,255,0.13);
  border-radius: 20px; padding: 5px 12px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.09);
}
.sdot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 5px var(--teal), 0 0 12px rgba(42,255,204,0.3);
  animation: breathe 2.8s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
.stext {
  font-size: 10px; font-weight: 800; letter-spacing: 1.5px;
  color: var(--dim); text-transform: uppercase;
}

/* ── BODY ── */
.body-row { flex:1; display:flex; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 64px; flex-shrink: 0;
  display: flex; flex-direction: column;
  align-items: center; padding: 14px 0; gap: 4px;
  background: linear-gradient(90deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.025) 100%);
  border-right: 1px solid var(--rim);
  box-shadow: inset -1px 0 0 rgba(255,255,255,0.04), 2px 0 14px rgba(0,0,0,0.35);
  backdrop-filter: blur(14px);
}
.sib {
  width: 42px; height: 42px; border-radius: 11px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; gap: 3px;
  transition: all .18s;
  border: 1px solid transparent;
}
.sib:hover {
  background: linear-gradient(160deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.04) 100%);
  border-color: var(--rim);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 0 12px rgba(91,200,255,0.12);
}
.sib.on {
  background: linear-gradient(160deg, rgba(91,200,255,0.28) 0%, rgba(20,90,205,0.42) 100%);
  border-color: rgba(120,200,255,0.42);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 0 18px rgba(91,200,255,0.22);
}
.sib-ico { font-size: 18px; line-height: 1; }
.sib-lbl { font-size: 7.5px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; color: var(--dim); }
.sib.on .sib-lbl { color: var(--blue); }
.sib-space { flex: 1; }
.panic {
  width: 42px; height: 28px; border-radius: 14px;
  background: linear-gradient(180deg, rgba(255,48,80,0.28) 0%, rgba(182,14,34,0.5) 100%);
  border: 1px solid rgba(255,68,100,0.38);
  border-top-color: rgba(255,160,170,0.28);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 13px;
  box-shadow: inset 0 1px 0 rgba(255,200,200,0.14), 0 0 10px rgba(255,40,70,0.1);
  transition: all .15s;
}
.panic:hover {
  background: linear-gradient(180deg, rgba(255,68,100,0.5) 0%, rgba(210,18,44,0.72) 100%);
  box-shadow: inset 0 1px 0 rgba(255,200,200,0.2), 0 0 20px rgba(255,40,70,0.4);
}

/* ── MAIN ── */
.main { flex:1; overflow:hidden; display:flex; flex-direction:column; }

/* ── HOME ── */
#pg-home {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px; gap: 0;
}
.orb-halo {
  position: absolute; width: 440px; height: 230px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(18,78,210,0.22) 0%, transparent 70%);
  filter: blur(55px); pointer-events: none;
}
.home-title {
  font-size: clamp(44px, 6.5vw, 72px); font-weight: 900; letter-spacing: -1px;
  text-align: center; line-height: 1.05;
  background: linear-gradient(155deg, #fff 15%, #80d8ff 52%, #2affcc 92%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 28px rgba(91,200,255,0.32));
  margin-bottom: 6px; position: relative; z-index: 1;
}
.home-sub {
  font-size: 12px; font-weight: 700; letter-spacing: 3.5px;
  text-transform: uppercase; color: var(--dim);
  margin-bottom: 34px; position: relative; z-index: 1;
}
.hero-wrap { width: 100%; max-width: 600px; position: relative; z-index: 1; }
.hero-input {
  width: 100%;
  background: linear-gradient(180deg,
    rgba(255,255,255,0.17) 0%,
    rgba(255,255,255,0.07) 44%,
    rgba(6,20,55,0.64)    100%
  );
  border: 1px solid rgba(130,200,255,0.35);
  border-top-color: rgba(205,238,255,0.52);
  border-radius: 16px;
  padding: 18px 62px 18px 24px;
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 15px; font-weight: 500; font-style: italic;
  backdrop-filter: blur(18px);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.22),
    inset 0 -1px 0 rgba(0,0,0,0.25),
    0 10px 40px rgba(0,0,0,0.55),
    0 2px 8px rgba(0,0,0,0.3);
  transition: all .2s;
}
.hero-input::placeholder { color: rgba(172,212,242,0.4); }
.hero-input:focus {
  outline: none; font-style: normal;
  border-color: rgba(91,200,255,0.62);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.22),
    inset 0 -1px 0 rgba(0,0,0,0.25),
    0 10px 40px rgba(0,0,0,0.55),
    0 0 0 3px rgba(91,200,255,0.12),
    0 0 32px rgba(91,200,255,0.14);
}
.hero-go {
  position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
  width: 46px; height: 38px;
  background: linear-gradient(180deg,
    rgba(110,210,255,0.5)  0%,
    rgba(40,135,238,0.72) 46%,
    rgba(18,80,196,0.9)   100%
  );
  border: 1px solid rgba(130,210,255,0.52);
  border-top-color: rgba(230,248,255,0.52);
  border-radius: 11px; color: #fff; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.32), inset 0 -1px 0 rgba(0,0,0,0.3), 0 3px 10px rgba(0,0,0,0.5);
  transition: all .15s;
}
.hero-go:hover {
  background: linear-gradient(180deg,
    rgba(150,225,255,0.65) 0%,
    rgba(60,160,255,0.85)  46%,
    rgba(26,100,225,0.95)  100%
  );
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 0 22px rgba(91,200,255,0.45);
}
.hero-go:active { transform: translateY(-50%) scale(.97); }
.hero-hint {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  color: var(--dim); margin-top: 13px;
  position: relative; z-index: 1;
}

/* ── GAMES PAGE ── */
#pg-games {
  flex: 1; overflow-y: auto; padding: 24px 24px;
  display: none;
}
#pg-games::-webkit-scrollbar { width: 5px; }
#pg-games::-webkit-scrollbar-thumb { background: rgba(91,200,255,0.18); border-radius: 3px; }

.sec-head {
  font-size: 10px; font-weight: 800; letter-spacing: 2.5px;
  text-transform: uppercase; color: rgba(100,170,232,0.55);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.sec-head::after { content:''; flex:1; height:1px; background: linear-gradient(90deg, var(--rim), transparent); }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 11px; margin-bottom: 26px;
}

/* aero card */
.card {
  background: linear-gradient(148deg,
    rgba(255,255,255,0.14) 0%,
    rgba(255,255,255,0.055) 38%,
    rgba(6,22,56,0.62)     100%
  );
  border: 1px solid var(--rim);
  border-top-color: rgba(220,240,255,0.28);
  border-radius: 14px;
  padding: 16px 13px 13px;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 8px;
  position: relative; overflow: hidden;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 4px 18px rgba(0,0,0,0.42);
  backdrop-filter: blur(12px);
  transition: all .2s cubic-bezier(.25,.8,.25,1);
}
.card::before {
  content: ''; position: absolute; top:0; left:0; right:60%; height:45%;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  border-radius: 14px 0 0 0; pointer-events: none;
}
.card:hover {
  transform: translateY(-3px);
  border-color: rgba(120,200,255,0.5);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 10px 30px rgba(0,0,0,0.55), 0 0 22px rgba(91,200,255,0.16);
}
.card:active { transform: translateY(-1px); }
.c-emoji { font-size: 26px; line-height: 1; }
.c-name  { font-size: 12px; font-weight: 800; color: rgba(225,242,255,.95); line-height: 1.25; }
.c-tag   { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; color: var(--teal); }
.c-dot   { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 5px var(--teal); }

/* powered badge */
.powered {
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  color: rgba(91,200,255,0.5); margin-top: -4px;
}

/* ── BROWSE PAGE ── */
#pg-browse {
  flex: 1; overflow-y: auto; padding: 24px 24px;
  display: none;
}
#pg-browse::-webkit-scrollbar { width: 5px; }
#pg-browse::-webkit-scrollbar-thumb { background: rgba(91,200,255,0.18); border-radius: 3px; }

.blist { display: flex; flex-direction: column; gap: 7px; margin-bottom: 24px; }
.bitem {
  background: linear-gradient(130deg,
    rgba(255,255,255,0.11) 0%,
    rgba(255,255,255,0.04) 45%,
    rgba(4,16,44,0.58)     100%
  );
  border: 1px solid var(--rim);
  border-top-color: rgba(210,235,255,0.2);
  border-radius: 11px; padding: 12px 16px;
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 10px rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  transition: all .15s;
}
.bitem:hover {
  border-color: rgba(120,200,255,0.42);
  background: linear-gradient(130deg,
    rgba(255,255,255,0.17) 0%,
    rgba(255,255,255,0.07) 45%,
    rgba(8,24,60,0.58)     100%
  );
  transform: translateX(2px);
}
.bi-ico  { font-size: 20px; flex-shrink: 0; }
.bi-name { font-size: 13px; font-weight: 800; color: var(--white); }
.bi-desc { font-size: 11px; color: var(--dim); font-weight: 500; margin-top: 1px; }
.bi-src  { font-size: 9px; font-weight: 700; color: rgba(91,200,255,0.45); letter-spacing: .8px; margin-top: 2px; }

/* ── FRAME ── */
#frame {
  position: fixed; inset: 0; z-index: 600;
  display: none; flex-direction: column;
}
#frame.open { display: flex; }
.fbar {
  flex-shrink: 0; height: 42px;
  display: flex; align-items: center;
  padding: 0 14px; gap: 10px;
  background: linear-gradient(180deg,
    rgba(255,255,255,0.17) 0%,
    rgba(255,255,255,0.07) 46%,
    rgba(2,12,34,0.9)      100%
  );
  border-bottom: 1px solid var(--rim);
  box-shadow: inset 0 1px 0 var(--shine), 0 3px 14px rgba(0,0,0,0.6);
  backdrop-filter: blur(22px);
}
/* traffic light */
.tl-red {
  width: 15px; height: 15px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #ff9198, #e0203e);
  border: 1px solid rgba(180,10,30,0.55);
  box-shadow: inset 0 1px 0 rgba(255,210,210,0.3), 0 1px 3px rgba(0,0,0,0.5);
  cursor: pointer; transition: filter .15s; flex-shrink: 0;
}
.tl-red:hover { filter: brightness(1.3); }
.ftitle { font-size: 12px; font-weight: 700; color: var(--dim); letter-spacing: .4px; }
.furl {
  flex: 1; max-width: 420px;
  background: linear-gradient(180deg, rgba(0,6,22,0.82) 0%, rgba(0,12,34,0.68) 100%);
  border: 1px solid rgba(70,130,215,0.3);
  border-top-color: rgba(10,40,100,0.8);
  border-radius: 7px; padding: 5px 12px;
  font-size: 11px; font-weight: 500; color: var(--dim);
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
#viewer { flex: 1; border: none; background: #fff; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, rgba(6,20,54,0.95), rgba(3,12,34,.97));
  border: 1px solid var(--rim);
  border-top-color: rgba(200,230,255,0.22);
  border-radius: 10px; padding: 9px 20px;
  font-size: 12px; font-weight: 700; color: var(--dim);
  backdrop-filter: blur(22px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.1);
  z-index: 900; opacity: 0; pointer-events: none;
  transition: opacity .3s; white-space: nowrap;
}
.toast.show { opacity: 1; }

</style>
</head>
<body>

<div class="bg"></div>
<div class="stars"></div>

<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">ATOM</div>
    <div class="tb-div"></div>
    <div class="addr-wrap">
      <input class="addr-input" id="addr"
        placeholder="Search Brave or paste a URL..."
        onkeydown="if(event.key==='Enter') go(this.value,'Web')">
      <div class="addr-go" onclick="go(document.getElementById('addr').value,'Web')">↵</div>
    </div>
    <div class="status-pill">
      <div class="sdot" id="sdot"></div>
      <div class="stext" id="stext">Ready</div>
    </div>
  </div>

  <div class="body-row">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sib on" id="sib-home"   onclick="page('home')">
        <div class="sib-ico">⌂</div>
        <div class="sib-lbl">Home</div>
      </div>
      <div class="sib"    id="sib-games"  onclick="page('games')">
        <div class="sib-ico">◈</div>
        <div class="sib-lbl">Games</div>
      </div>
      <div class="sib"    id="sib-browse" onclick="page('browse')">
        <div class="sib-ico">⊞</div>
        <div class="sib-lbl">Browse</div>
      </div>
      <div class="sib-space"></div>
      <div class="panic" title="Panic  ]" onclick="panic()">⚑</div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- HOME -->
      <div id="pg-home">
        <div class="orb-halo"></div>
        <div class="home-title">Welcome to ATOM</div>
        <div class="home-sub">Roblox · Cloud · Space</div>
        <div class="hero-wrap">
          <input class="hero-input" id="hero"
            placeholder="Search Brave or type a URL..."
            onkeydown="if(event.key==='Enter') go(this.value,'Web')">
          <div class="hero-go" onclick="go(document.getElementById('hero').value,'Web')">→</div>
        </div>
        <div class="hero-hint">enter to go &nbsp;·&nbsp; ] panic &nbsp;·&nbsp; esc close</div>
      </div>

      <!-- GAMES -->
      <div id="pg-games">
        <div class="sec-head">Popular</div>
        <div class="grid" id="g-pop"></div>
        <div class="sec-head">Action</div>
        <div class="grid" id="g-act"></div>
        <div class="sec-head">Roleplay</div>
        <div class="grid" id="g-rp"></div>
      </div>

      <!-- BROWSE -->
      <div id="pg-browse">
        <div class="sec-head">Roblox on EasyFun</div>
        <div class="blist" id="b-ef"></div>
        <div class="sec-head">Web</div>
        <div class="blist" id="b-web"></div>
      </div>

    </div>
  </div>
</div>

<!-- FRAME -->
<div id="frame">
  <div class="fbar">
    <div class="tl-red" onclick="closeFrame()"></div>
    <div class="ftitle" id="ftitle">—</div>
    <div class="furl"   id="furl"></div>
  </div>
  <iframe id="viewer" src="about:blank" allowfullscreen
    allow="fullscreen; autoplay; clipboard-read; clipboard-write"
    sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals allow-pointer-lock allow-top-navigation-by-user-activation">
  </iframe>
</div>

<div class="toast" id="toast"></div>

<!-- UV scripts — only load when deployed on a UV Node server -->
<script src="/uv/uv.bundle.js" onerror="window.__uvMissing=true"></script>
<script src="/uv/uv.config.js" onerror="window.__uvMissing=true"></script>

<script>

/* ========================================================
   REAL DATA — EasyFun.gg game-specific URLs
   All confirmed from easyfun.gg/cloud-games/type/roblox.html
   ======================================================== */

const EF = 'https://www.easyfun.gg/cloud-games/';

const GAMES = {
  pop: [
    { e:'🍎', n:'Blox Fruits',       tag:'~600k',  u: EF + 'blox-fruits.html' },
    { e:'🐾', n:'Adopt Me!',          tag:'~500k',  u: EF + 'adopt-me-.html' },
    { e:'🐶', n:'Pet Simulator 99',   tag:'~300k',  u: EF + 'pet-simulator-99.html' },
    { e:'🚪', n:'DOORS',              tag:'~200k',  u: EF + 'doors.html' },
    { e:'🏡', n:'Brookhaven RP',      tag:'~400k',  u: EF + 'brookhaven%F0%9F%8F%A1rp.html' },
    { e:'🏙️', n:'Welcome to Bloxburg',tag:'~90k',   u: EF + 'welcome-to-bloxburg.html' },
  ],
  act: [
    { e:'🔪', n:'Murder Mystery 2',   tag:'~180k',  u: EF + 'roblox.html' },
    { e:'🚔', n:'Jailbreak',          tag:'~120k',  u: EF + 'roblox.html' },
    { e:'🗼', n:'Tower of Hell',      tag:'~90k',   u: EF + 'roblox.html' },
    { e:'🔫', n:'Arsenal',            tag:'~80k',   u: EF + 'roblox.html' },
  ],
  rp: [
    { e:'👑', n:'Royale High',        tag:'~80k',   u: EF + 'roblox.html' },
    { e:'🍕', n:'Work at a Pizza',    tag:'~60k',   u: EF + 'roblox.html' },
    { e:'👗', n:'Dress to Impress',   tag:'~170k',  u: EF + 'roblox.html' },
    { e:'🌸', n:'Berry Avenue',       tag:'~70k',   u: EF + 'roblox.html' },
  ],
};

// EasyFun browse list
const BROWSE_EF = [
  { e:'🎮', n:'Roblox (Cloud)',        d:'Full Roblox, browser-based',   s:'easyfun.gg', u: EF + 'roblox.html' },
  { e:'🍎', n:'Blox Fruits',           d:'Play Blox Fruits instantly',   s:'easyfun.gg', u: EF + 'blox-fruits.html' },
  { e:'🐾', n:'Adopt Me!',             d:'Play Adopt Me instantly',      s:'easyfun.gg', u: EF + 'adopt-me-.html' },
  { e:'🐶', n:'Pet Simulator 99',      d:'Play Pet Sim 99 instantly',    s:'easyfun.gg', u: EF + 'pet-simulator-99.html' },
  { e:'🚪', n:'DOORS',                 d:'Play DOORS instantly',         s:'easyfun.gg', u: EF + 'doors.html' },
  { e:'🏡', n:'Brookhaven RP',         d:'Play Brookhaven instantly',    s:'easyfun.gg', u: EF + 'brookhaven%F0%9F%8F%A1rp.html' },
  { e:'🏙️', n:'Welcome to Bloxburg',   d:'Play Bloxburg instantly',      s:'easyfun.gg', u: EF + 'welcome-to-bloxburg.html' },
];

const BROWSE_WEB = [
  { e:'🦁', n:'Brave Search',          d:'Private search engine',        s:'search.brave.com', u:'https://search.brave.com' },
  { e:'📺', n:'YouTube',               d:'Watch videos',                 s:'youtube.com',      u:'https://www.youtube.com' },
  { e:'💬', n:'Discord',               d:'Chat with friends',            s:'discord.com',      u:'https://discord.com/app' },
  { e:'🟠', n:'Reddit',                d:'Browse communities',           s:'reddit.com',       u:'https://www.reddit.com' },
  { e:'🤖', n:'ChatGPT',               d:'AI assistant',                 s:'chat.openai.com',  u:'https://chat.openai.com' },
];

/* ========================================================
   BUILD UI
   ======================================================== */
function mkCard(item) {
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <div class="c-emoji">${item.e}</div>
    <div class="c-name">${item.n}</div>
    <div class="c-tag"><div class="c-dot"></div>${item.tag} playing</div>
    <div class="powered">via easyfun.gg</div>
  `;
  el.onclick = () => go(item.u, item.n);
  return el;
}

function mkBrow(item) {
  const el = document.createElement('div');
  el.className = 'bitem';
  el.innerHTML = `
    <div class="bi-ico">${item.e}</div>
    <div>
      <div class="bi-name">${item.n}</div>
      <div class="bi-desc">${item.d}</div>
      <div class="bi-src">${item.s}</div>
    </div>
  `;
  el.onclick = () => go(item.u, item.n);
  return el;
}

Object.entries(GAMES).forEach(([k, arr]) => {
  const g = document.getElementById('g-' + k);
  if (g) arr.forEach(i => g.appendChild(mkCard(i)));
});
BROWSE_EF.forEach(i => document.getElementById('b-ef').appendChild(mkBrow(i)));
BROWSE_WEB.forEach(i => document.getElementById('b-web').appendChild(mkBrow(i)));

/* ========================================================
   PAGE NAV
   ======================================================== */
function page(p) {
  ['home','games','browse'].forEach(id => {
    const pg = document.getElementById('pg-'+id);
    const sb = document.getElementById('sib-'+id);
    if (pg) pg.style.display = 'none';
    if (sb) sb.classList.remove('on');
  });
  const tgt = document.getElementById('pg-'+p);
  const btn = document.getElementById('sib-'+p);
  if (tgt) tgt.style.display = (p === 'home') ? 'flex' : 'block';
  if (btn) btn.classList.add('on');
  if (p === 'home') setTimeout(() => document.getElementById('hero').focus(), 50);
}

/* ========================================================
   LAUNCH
   ======================================================== */
let _swReady = false;

async function ensureSW() {
  if (_swReady) return;
  if (!navigator.serviceWorker) throw new Error('SW not supported');
  await navigator.serviceWorker.register('/uv/sw.js', { scope: __uv$config.prefix });
  _swReady = true;
}

async function go(raw, title) {
  raw = (raw || '').trim();
  if (!raw) return;

  let url = raw;
  if (!url.startsWith('http')) {
    if (url.includes('.') && !url.includes(' ')) {
      url = 'https://' + url;
    } else {
      // Brave search as default
      url = 'https://search.brave.com/search?q=' + encodeURIComponent(url);
    }
  }

  document.getElementById('addr').value = url;
  document.getElementById('ftitle').textContent = title || 'Page';
  document.getElementById('furl').textContent = url;
  document.getElementById('viewer').src = 'about:blank';
  document.getElementById('frame').classList.add('open');
  setStatus('Connecting…', false);

  try {
    if (window.__uvMissing || typeof __uv$config === 'undefined') {
      // No UV backend — open directly (works fine for easyfun.gg)
      document.getElementById('viewer').src = url;
      setStatus('Direct', true);
      return;
    }
    await ensureSW();
    document.getElementById('viewer').src = __uv$config.prefix + __uv$config.encodeUrl(url);
    setStatus('Proxied ✓', true);
  } catch(e) {
    console.warn('UV failed, falling back:', e);
    document.getElementById('viewer').src = url;
    setStatus('Direct', true);
    showToast('UV unavailable — using direct mode');
  }
}

function closeFrame() {
  document.getElementById('frame').classList.remove('open');
  document.getElementById('viewer').src = 'about:blank';
  setStatus('Ready', true);
}

function setStatus(msg, ok) {
  document.getElementById('stext').textContent = msg;
  const d = document.getElementById('sdot');
  d.style.background = ok ? 'var(--teal)' : '#f0a830';
  d.style.boxShadow  = ok
    ? '0 0 5px var(--teal), 0 0 12px rgba(42,255,204,.3)'
    : '0 0 5px #f0a830';
}

/* ========================================================
   TOAST / PANIC / KEYS
   ======================================================== */
let _tt;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3500);
}

function panic() { window.location.replace('https://classroom.google.com'); }

document.addEventListener('keydown', e => {
  if (e.key === ']') panic();
  if (e.key === 'Escape') closeFrame();
});

page('home');
</script>
</body>
</html>
