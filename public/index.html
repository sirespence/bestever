<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtomOS v2 | Hypervisor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-glass: rgba(22, 22, 22, 0.65);
            --bg-glass-light: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.1);
            --highlight: #00d2ff;
            --taskbar-height: 48px;
            --win-radius: 10px;
        }

        * { box-sizing: border-box; outline: none; }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Inter, sans-serif;
            overflow: hidden;
            background: #000;
            color: #eee;
            user-select: none;
        }

        /* --- Boot Screen --- */
        #boot-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }
        .loader {
            width: 50px; height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--highlight);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Wallpaper & Desktop --- */
        #wallpaper {
            position: fixed; inset: 0;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center/cover;
            transition: transform 0.3s;
            z-index: 0;
        }

        #desktop {
            position: absolute; inset: 0; bottom: var(--taskbar-height);
            padding: 20px;
            display: flex; flex-direction: column; flex-wrap: wrap; align-content: flex-start; gap: 15px;
            z-index: 1;
        }

        /* --- Icons --- */
        .d-icon {
            width: 86px; padding: 10px;
            border-radius: 8px;
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: 0.2s;
            border: 1px solid transparent;
        }
        .d-icon:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .d-icon i { font-size: 32px; margin-bottom: 8px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .d-icon span { font-size: 12px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); text-align: center; }

        /* --- Windows --- */
        .window {
            position: absolute;
            background: rgba(18, 18, 24, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--win-radius);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
            min-width: 300px; min-height: 200px;
            transition: transform 0.15s, opacity 0.15s;
            opacity: 0; transform: scale(0.9); visibility: hidden;
            overflow: hidden; resize: both;
        }
        .window.open { opacity: 1; transform: scale(1); visibility: visible; }
        .window.minimized { opacity: 0; transform: scale(0.8) translateY(200px); pointer-events: none; }

        .title-bar {
            height: 36px; background: rgba(255,255,255,0.03);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; border-bottom: 1px solid var(--border);
            cursor: default;
        }
        
        .win-drag-area { flex: 1; height: 100%; display: flex; align-items: center; }

        .win-controls { display: flex; gap: 8px; margin-right: 5px; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; position: relative; }
        .btn-close { background: #ff5f56; }
        .btn-min { background: #ffbd2e; }
        .btn-max { background: #27c93f; }
        .win-btn:hover::after { content:''; position: absolute; inset: 0; background: rgba(0,0,0,0.1); border-radius: 50%; }

        .win-content { flex: 1; position: relative; background: #fff; }
        .win-content.dark { background: #1a1a1a; color: #fff; }

        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        /* --- Browser UI --- */
        .browser-toolbar {
            display: flex; gap: 8px; padding: 8px; background: #2c2c2c; align-items: center;
        }
        .nav-btn { color: #aaa; cursor: pointer; padding: 5px; transition: 0.2s; }
        .nav-btn:hover { color: #fff; }
        
        .url-box {
            flex: 1; background: #1a1a1a; border: 1px solid #444;
            border-radius: 15px; padding: 6px 15px; color: #fff; font-size: 13px;
            display: flex; align-items: center;
        }
        .url-input { background: transparent; border: none; color: #fff; width: 100%; font-family: inherit; }
        
        .proxy-select {
            background: #333; color: #fff; border: 1px solid #444;
            border-radius: 5px; padding: 4px; font-size: 11px; cursor: pointer;
        }

        /* --- Taskbar --- */
        #taskbar {
            position: absolute; bottom: 0; width: 100%; height: var(--taskbar-height);
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(25px);
            border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            z-index: 9990; padding: 0 10px;
        }

        .start-btn {
            position: absolute; left: 10px;
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; box-shadow: 0 0 10px rgba(0,114,255,0.4);
            cursor: pointer; transition: 0.2s;
        }
        .start-btn:hover { filter: brightness(1.2); transform: scale(1.05); }

        .task-app {
            width: 40px; height: 40px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #ccc; cursor: pointer;
            transition: 0.2s; position: relative;
        }
        .task-app:hover { background: rgba(255,255,255,0.1); color: #fff; transform: translateY(-3px); }
        .task-app.active { background: rgba(255,255,255,0.15); box-shadow: inset 0 -2px 0 var(--highlight); }
        .task-app.active i { color: var(--highlight); }

        .tray {
            position: absolute; right: 15px;
            display: flex; flex-direction: column; align-items: flex-end;
            font-size: 11px; color: #ccc;
        }

        /* --- Start Menu --- */
        #start-menu {
            position: absolute; bottom: 60px; left: 10px;
            width: 320px; height: 400px;
            background: rgba(20, 20, 25, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 12px;
            transform: translateY(20px); opacity: 0; pointer-events: none;
            transition: 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 9991; padding: 20px;
            display: flex; flex-direction: column;
        }
        #start-menu.show { transform: translateY(0); opacity: 1; pointer-events: auto; }

        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 15px; }
        .menu-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; color: #eee; font-size: 11px;
            padding: 10px; border-radius: 8px; transition: 0.2s;
        }
        .menu-item:hover { background: rgba(255,255,255,0.1); }
        .menu-item i { font-size: 24px; }

        /* --- Settings Win Specifics --- */
        .settings-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
        .setting-input { background: #333; border: 1px solid #555; color: white; padding: 4px; }
    </style>
</head>
<body>

    <!-- Boot Animation -->
    <div id="boot-screen">
        <div class="loader"></div>
        <div style="font-size: 24px; font-weight: 300; letter-spacing: 2px;">ATOM <b style="color:var(--highlight)">OS</b></div>
        <div style="margin-top:10px; font-size:12px; color:#666;">v2.1.0 • Hypervisor</div>
    </div>

    <div id="wallpaper"></div>

    <!-- Desktop Icons -->
    <div id="desktop">
        <div class="d-icon" onclick="AppManager.open('browser')">
            <i class="fa-brands fa-chrome" style="color: #4facfe;"></i>
            <span>Browser</span>
        </div>
        <div class="d-icon" onclick="AppManager.open('roblox')">
            <i class="fa-solid fa-gamepad" style="color: #ff5f56;"></i>
            <span>Roblox Cloud</span>
        </div>
        <div class="d-icon" onclick="AppManager.open('discord')">
            <i class="fa-brands fa-discord" style="color: #7289da;"></i>
            <span>Discord</span>
        </div>
        <div class="d-icon" onclick="AppManager.open('settings')">
            <i class="fa-solid fa-gear" style="color: #aaa;"></i>
            <span>Settings</span>
        </div>
        <div class="d-icon" onclick="AppManager.open('terminal')">
            <i class="fa-solid fa-terminal" style="color: #27c93f;"></i>
            <span>Terminal</span>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div class="start-btn" onclick="toggleStartMenu()">
            <i class="fa-brands fa-windows"></i>
        </div>
        
        <!-- Task Items Injected Here -->
        <div id="task-container" style="display:flex; gap:8px;"></div>

        <div class="tray">
            <span id="clock-time" style="font-weight:600; font-size:13px;">12:00</span>
            <span id="clock-date">Mar 05</span>
        </div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu">
        <input type="text" placeholder="Search apps..." style="width:100%; background:#333; border:none; padding:10px; border-radius:6px; color:white;">
        <div class="menu-grid">
            <div class="menu-item" onclick="AppManager.open('browser', 'https://www.google.com')"><i class="fa-brands fa-google"></i> Google</div>
            <div class="menu-item" onclick="AppManager.open('browser', 'https://www.youtube.com')"><i class="fa-brands fa-youtube" style="color:red"></i> YouTube</div>
            <div class="menu-item" onclick="AppManager.open('browser', 'https://poki.com')"><i class="fa-solid fa-ghost"></i> Poki</div>
            <div class="menu-item" onclick="AppManager.open('browser', 'https://geometridash.io')"><i class="fa-solid fa-cube"></i> Geometry</div>
        </div>
    </div>

    <!-- Templates (Hidden) -->
    <template id="tpl-window">
        <div class="window">
            <div class="title-bar">
                <div class="win-controls">
                    <div class="win-btn btn-close"></div>
                    <div class="win-btn btn-min"></div>
                    <div class="win-btn btn-max"></div>
                </div>
                <div class="win-drag-area" style="font-size:12px; color:#aaa; margin-left:10px;">Title</div>
            </div>
            <div class="win-content"></div>
        </div>
    </template>

    <script>
        // --- Core OS Config ---
        const CONFIG = {
            proxyServices: {
                'Direct': '',
                'UV (Public)': 'https://ultraviolet.googleusercontent.com/service/', // Example placeholder
                'Rammerhead': 'https://r.rh.xyz/',
                'MathProxy': 'https://math-help-service.com/'
            },
            homePage: 'https://www.google.com/webhp?igu=1'
        };

        // --- Utils ---
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        // --- Boot Sequence ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                $('#boot-screen').style.opacity = '0';
                setTimeout(() => $('#boot-screen').remove(), 1000);
            }, 1500);
            updateClock();
            setInterval(updateClock, 1000);
        });

        function updateClock() {
            const now = new Date();
            $('#clock-time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            $('#clock-date').innerText = now.toLocaleDateString([], {month: 'short', day: 'numeric'});
        }

        // --- Window Manager System ---
        class WindowManager {
            constructor() {
                this.windows = {};
                this.zIndex = 100;
                this.activeWindowId = null;
            }

            create(appId, title, contentHTML, width=800, height=600) {
                const id = 'win-' + Date.now();
                const tpl = $('#tpl-window').content.cloneNode(true);
                const winEl = tpl.querySelector('.window');
                
                winEl.id = id;
                winEl.style.width = width + 'px';
                winEl.style.height = height + 'px';
                winEl.style.left = Math.max(50, (window.innerWidth - width) / 2 + (Math.random()*40)) + 'px';
                winEl.style.top = Math.max(50, (window.innerHeight - height) / 2 + (Math.random()*40)) + 'px';
                winEl.style.zIndex = ++this.zIndex;

                winEl.querySelector('.win-drag-area').innerText = title;
                winEl.querySelector('.win-content').innerHTML = contentHTML;

                // Event Listeners
                winEl.querySelector('.btn-close').onclick = () => this.close(id);
                winEl.querySelector('.btn-min').onclick = () => this.minimize(id);
                winEl.querySelector('.btn-max').onclick = () => this.maximize(id);
                winEl.addEventListener('mousedown', () => this.focus(id));
                winEl.querySelector('.title-bar').addEventListener('mousedown', (e) => this.startDrag(e, winEl));

                document.body.appendChild(winEl);
                
                // Add to taskbar
                this.addTaskbarItem(id, appId);

                // Animation
                setTimeout(() => winEl.classList.add('open'), 10);
                
                this.windows[id] = { element: winEl, minimized: false, maximized: false };
                this.focus(id);
                return id;
            }

            close(id) {
                const win = this.windows[id];
                if(win) {
                    win.element.classList.remove('open');
                    setTimeout(() => win.element.remove(), 200);
                    $(`#task-${id}`).remove();
                    delete this.windows[id];
                }
            }

            minimize(id) {
                const win = this.windows[id];
                win.element.classList.toggle('minimized');
                $(`#task-${id}`).classList.toggle('active', !win.element.classList.contains('minimized'));
            }

            maximize(id) {
                const win = this.windows[id].element;
                if(!this.windows[id].maximized) {
                    this.windows[id].prevStyles = { top: win.style.top, left: win.style.left, width: win.style.width, height: win.style.height };
                    win.style.top = '0'; win.style.left = '0'; win.style.width = '100%'; win.style.height = `calc(100% - var(--taskbar-height))`;
                    win.style.borderRadius = '0';
                } else {
                    const s = this.windows[id].prevStyles;
                    win.style.top = s.top; win.style.left = s.left; win.style.width = s.width; win.style.height = s.height;
                    win.style.borderRadius = 'var(--win-radius)';
                }
                this.windows[id].maximized = !this.windows[id].maximized;
            }

            focus(id) {
                if(this.windows[id]) {
                    this.windows[id].element.style.zIndex = ++this.zIndex;
                    this.activeWindowId = id;
                    $$('.task-app').forEach(el => el.classList.remove('active'));
                    $(`#task-${id}`).classList.add('active');
                    
                    // Restore if minimized
                    if(this.windows[id].element.classList.contains('minimized')) {
                        this.minimize(id);
                    }
                }
            }

            addTaskbarItem(winId, appId) {
                const iconMap = {
                    'browser': 'fa-chrome',
                    'roblox': 'fa-gamepad',
                    'discord': 'fa-discord',
                    'settings': 'fa-gear',
                    'terminal': 'fa-terminal'
                };
                const div = document.createElement('div');
                div.className = 'task-app active';
                div.id = `task-${winId}`;
                div.innerHTML = `<i class="fa-brands ${iconMap[appId] || 'fa-window-maximize'}"></i>`;
                div.onclick = () => this.focus(winId);
                $('#task-container').appendChild(div);
            }

            startDrag(e, winEl) {
                if(e.target.classList.contains('win-btn') || e.target.classList.contains('win-controls')) return;
                e.preventDefault();
                let x = e.clientX, y = e.clientY;
                let r = winEl.getBoundingClientRect();
                let offsetX = x - r.left;
                let offsetY = y - r.top;

                const move = (e) => {
                    winEl.style.left = (e.clientX - offsetX) + 'px';
                    winEl.style.top = (e.clientY - offsetY) + 'px';
                };
                const stop = () => {
                    document.removeEventListener('mousemove', move);
                    document.removeEventListener('mouseup', stop);
                };
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', stop);
            }
        }

        const WM = new WindowManager();

        // --- App Definitions ---
        const AppManager = {
            open: (appId, arg) => {
                $('#start-menu').classList.remove('show');
                switch(appId) {
                    case 'browser':
                        AppManager.launchBrowser(arg);
                        break;
                    case 'roblox':
                        AppManager.launchBrowser('https://now.gg/apps/roblox-corporation/5349/roblox.html'); // Cloud logic
                        break;
                    case 'discord':
                        AppManager.launchBrowser('https://discord.com/app');
                        break;
                    case 'settings':
                        AppManager.launchSettings();
                        break;
                    case 'terminal':
                        AppManager.launchTerminal();
                        break;
                }
            },

            launchBrowser: (startUrl = CONFIG.homePage) => {
                const html = `
                    <div style="display:flex; flex-direction:column; height:100%;">
                        <div class="browser-toolbar">
                            <i class="fa-solid fa-arrow-left nav-btn" onclick="this.closest('.win-content').querySelector('iframe').contentWindow.history.back()"></i>
                            <i class="fa-solid fa-rotate-right nav-btn" onclick="this.closest('.win-content').querySelector('iframe').contentWindow.location.reload()"></i>
                            <div class="url-box">
                                <select id="proxy-mode" class="proxy-select" style="margin-right:5px; border:none; background:#222;">
                                    <option value="Direct">Direct</option>
                                    <option value="UV (Public)">Ultraviolet</option>
                                    <option value="Rammerhead">Rammerhead</option>
                                </select>
                                <input class="url-input" type="text" value="${startUrl}" onkeydown="if(event.key==='Enter') navigateBrowser(this)">
                            </div>
                        </div>
                        <iframe src="${startUrl}" sandbox="allow-same-origin allow-scripts allow-forms allow-pointer-lock allow-popups"></iframe>
                    </div>
                `;
                WM.create('browser', 'Atom Browser', html, 900, 600);
            },

            launchSettings: () => {
                const html = `
                    <div style="padding:20px; color:#ccc; height:100%; overflow-y:auto; background:#1a1a1a;">
                        <h2>Settings</h2>
                        <div class="settings-row">
                            <span>Wallpaper URL</span>
                            <input type="text" class="setting-input" onchange="document.getElementById('wallpaper').style.backgroundImage = 'url('+this.value+')'" placeholder="Paste Image URL">
                        </div>
                        <div class="settings-row">
                            <span>Proxy Endpoint (UV)</span>
                            <input type="text" class="setting-input" placeholder="https://your-uv-app.herokuapp.com/">
                        </div>
                        <p style="font-size:12px; color:#666; margin-top:20px;">
                            Note: For "Roblox" to work, use a Cloud Gaming URL or a dedicated Proxy that supports WebSockets.
                            Standard HTML proxies will likely fail with complex 3D games.
                        </p>
                    </div>
                `;
                WM.create('settings', 'System Settings', html, 500, 400);
            },
            
            launchTerminal: () => {
                const html = `
                    <div style="background:#0c0c0c; color:#0f0; padding:10px; font-family:monospace; height:100%;" onclick="this.querySelector('input').focus()">
                        <div>Welcome to AtomOS Shell v1.0</div>
                        <div id="term-output"></div>
                        <div style="display:flex;">
                            <span>root@atom:~#&nbsp;</span>
                            <input type="text" style="background:transparent; border:none; color:#0f0; flex:1; font-family:monospace;" onkeydown="handleTerm(this)">
                        </div>
                    </div>
                `;
                WM.create('terminal', 'Terminal', html, 600, 350);
            }
        };

        // --- Browser Logic ---
        function navigateBrowser(input) {
            const wrapper = input.closest('.win-content');
            const iframe = wrapper.querySelector('iframe');
            const mode = wrapper.querySelector('#proxy-mode').value;
            
            let url = input.value.trim();
            if (!url.startsWith('http')) {
                if (url.includes('.')) url = 'https://' + url;
                else url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            }

            // Proxy Handling Logic
            if (mode !== 'Direct') {
                const prefix = CONFIG.proxyServices[mode];
                if(prefix) {
                    // Simple URL encoding for demonstration
                    // In a real UV setup, you need the XOR encoding logic here
                    url = prefix + url; 
                } else {
                    alert("No endpoint configured for this proxy type.");
                }
            }
            
            iframe.src = url;
        }

        // --- Terminal Logic ---
        function handleTerm(input) {
            if(event.key === 'Enter') {
                const val = input.value;
                const out = input.parentElement.previousElementSibling;
                out.innerHTML += `<div>root@atom:~# ${val}</div>`;
                
                if(val === 'help') out.innerHTML += `<div style="color:#fff">Commands: help, clear, ping, exit, hack</div>`;
                else if(val === 'clear') out.innerHTML = '';
                else if(val === 'hack') out.innerHTML += `<div style="color:red">Accessing Pentagon... [Failed]</div>`;
                else if(val === 'ping') out.innerHTML += `<div>Pong! (1ms)</div>`;
                else if(val === 'exit') WM.close(WM.activeWindowId);
                else out.innerHTML += `<div style="color:#f00">Command not found</div>`;

                input.value = '';
                input.scrollIntoView();
            }
        }

        // --- UI Interactions ---
        function toggleStartMenu() {
            $('#start-menu').classList.toggle('show');
        }

        document.addEventListener('click', (e) => {
            if(!e.target.closest('#start-menu') && !e.target.closest('.start-btn')) {
                $('#start-menu').classList.remove('show');
            }
        });

    </script>
</body>
</html>
