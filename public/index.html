<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atom</title>
    
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js", { scope: __uv$config.prefix });
            });
        }
    </script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #050208;
            background-image: radial-gradient(circle at center, #1a0b2e 0%, #050208 100%);
            font-family: ui-sans-serif, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 40px;
            width: 340px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 20px;
            font-weight: 800;
            letter-spacing: -2px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        .btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .rbx { background: #fff; color: #000; }
        .srch { background: rgba(255, 255, 255, 0.1); color: #fff; }

        button:hover { opacity: 0.8; transform: scale(0.98); }

        #view {
            position: fixed;
            inset: 0;
            display: none;
            background: #000;
            z-index: 1000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .x {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 25px;
            border-radius: 100px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div class="glass">
        <h1>atom</h1>
        <input type="text" id="i" placeholder="search or url...">
        <div class="btns">
            <button class="rbx" onclick="go('https://education-edition.github.io/roblox/')">roblox</button>
            <button class="srch" onclick="go(document.getElementById('i').value)">launch</button>
        </div>
    </div>

    <div id="view">
        <iframe id="f"></iframe>
        <button class="x" onclick="kill()">exit</button>
    </div>

    <script>
        const f = document.getElementById('f');
        const v = document.getElementById('view');
        const i = document.getElementById('i');

        function go(val) {
            let u = val.trim();
            if (!u) return;

            if (!u.includes('.')) {
                u = 'https://search.brave.com/search?q=' + encodeURIComponent(u);
            } else if (!u.startsWith('http')) {
                u = 'https://' + u;
            }

            f.src = __uv$config.prefix + __uv$config.encodeUrl(u);
            v.style.display = 'block';
        }

        function kill() {
            v.style.display = 'none';
            f.src = 'about:blank';
        }

        i.onkeydown = (e) => { if (e.key === 'Enter') go(i.value); };
    </script>
</body>
</html>
