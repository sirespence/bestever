<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atom</title>
    
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js", { scope: __uv$config.prefix });
            });
        }
    </script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            /* ios 26 inspired mesh gradient */
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 30%, #a1c4fd 70%, #c2e9fb 100%);
            background-size: 400% 400%;
            animation: flow 15s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        @keyframes flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .ios-container {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 45px;
            padding: 50px 40px;
            width: 360px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
            transform: scale(0.95);
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn { to { transform: scale(1); opacity: 1; } }

        h1 {
            font-weight: 800; font-size: 3.2rem; margin: 0 0 5px;
            color: rgba(255,255,255,0.95); letter-spacing: -2px;
        }

        p { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 30px; font-weight: 500; }

        .search-pill {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            border-radius: 25px;
            display: flex; padding: 10px 15px; margin-bottom: 15px;
        }

        input {
            flex: 1; background: transparent; border: none; outline: none;
            color: white; font-size: 1rem; padding: 10px; font-weight: 500;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.4); }

        .btn-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        button {
            padding: 15px; border-radius: 20px; border: none; font-weight: 700;
            cursor: pointer; font-size: 0.95rem; transition: 0.3s;
        }

        .btn-rbx { background: white; color: black; box-shadow: 0 10px 20px rgba(255,255,255,0.2); }
        .btn-go { background: rgba(0,0,0,0.2); color: white; border: 1px solid var(--border); }

        button:hover { transform: scale(1.05); opacity: 0.9; }

        /* hidden viewport */
        #viewport {
            position: fixed; inset: 0; display: none; background: black; z-index: 1000;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        iframe { width: 100%; height: 100%; border: none; }
        .exit-pill {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.2); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3); color: white;
            padding: 12px 30px; border-radius: 30px; font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="ios-container">
        <h1>atom</h1>
        <p>explore the nebula</p>
        
        <div class="search-pill">
            <input type="text" id="urlInput" placeholder="search or enter url...">
        </div>

        <div class="btn-stack">
            <button class="btn-rbx" onclick="openNode('https://now-gg.com/apps/roblox-corporation/5349/roblox.html')">roblox</button>
            <button class="btn-go" onclick="openNode(document.getElementById('urlInput').value)">launch</button>
        </div>
    </div>

    <div id="viewport">
        <iframe id="mainFrame"></iframe>
        <button class="exit-pill" onclick="closeNode()">close session</button>
    </div>

    <script>
        const frame = document.getElementById('mainFrame');
        const view = document.getElementById('viewport');
        const input = document.getElementById('urlInput');

        function openNode(val) {
            let url = val.trim();
            if (!url) return;

            // if it's a search term, use brave (google hates proxies)
            if (!url.includes('.')) {
                url = 'https://search.brave.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
            view.style.display = 'block';
        }

        function closeNode() {
            view.style.display = 'none';
            frame.src = 'about:blank';
        }

        input.onkeydown = (e) => { if (e.key === 'Enter') openNode(input.value); };
    </script>
</body>
</html>
