<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atom | 2006 🫧</title>
    
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js", { scope: __uv$config.prefix });
            });
        }
    </script>

    <style>
        :root {
            --gloss: rgba(255, 255, 255, 0.4);
            --aero-blue: #00d2ff;
            --aero-green: #3aeb3a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            /* frutiger aero "aurora" background */
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 30%, #ffffff 60%, #3aeb3a 100%);
            font-family: 'Segoe UI', 'Lucida Grande', sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* glossy bubble container */
        .glass-orb {
            background: var(--gloss);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 60px;
            padding: 50px;
            width: 380px;
            text-align: center;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.1),
                inset 0 10px 20px rgba(255,255,255,0.8),
                inset 0 -10px 20px rgba(0,0,0,0.05);
            position: relative;
        }

        h1 {
            font-size: 3.5rem; margin: 0;
            font-weight: 300; letter-spacing: -3px;
            background: linear-gradient(to bottom, #2e7d32, #0277bd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 2px rgba(255,255,255,1));
        }

        .subtitle { font-size: 0.8rem; color: #555; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #fff;
            padding: 15px 20px;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* glossy skeuomorphic buttons */
        button {
            padding: 15px; border-radius: 25px; border: none; font-weight: 800;
            cursor: pointer; font-size: 1rem; transition: 0.2s;
            color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            position: relative; overflow: hidden;
        }

        button::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
        }

        .btn-roblox { 
            background: linear-gradient(to bottom, #a2ff00, #4caf50); 
            box-shadow: 0 5px 0 #2e7d32, 0 10px 20px rgba(76,175,80,0.4);
        }
        .btn-launch { 
            background: linear-gradient(to bottom, #00d2ff, #3a7bd5); 
            box-shadow: 0 5px 0 #0277bd, 0 10px 20px rgba(58,123,213,0.4);
        }

        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #222; }

        /* full-view portal */
        #portal {
            position: fixed; inset: 0; display: none; background: #fff; z-index: 1000;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .back-pill {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.5); backdrop-filter: blur(10px);
            border: 1px solid #fff; padding: 10px 30px; border-radius: 50px;
            font-weight: 700; cursor: pointer; color: #333;
        }
    </style>
</head>
<body>

    <div class="glass-orb">
        <h1>atom</h1>
        <div class="subtitle">system software v2.0</div>
        
        <input type="text" id="userInput" placeholder="search the web or coordinates...">

        <div class="button-row">
            <button class="btn-roblox" onclick="blastOff('https://maddoxcloud.com/')">roblox</button>
            <button class="btn-launch" onclick="blastOff(document.getElementById('userInput').value)">search</button>
        </div>
    </div>

    <div id="portal">
        <iframe id="uvFrame"></iframe>
        <button class="back-pill" onclick="closePortal()">← return home</button>
    </div>

    <script>
        const frame = document.getElementById('uvFrame');
        const view = document.getElementById('portal');
        const input = document.getElementById('userInput');

        function blastOff(val) {
            let url = val.trim();
            if (!url) return;

            if (!url.includes('.')) {
                url = 'https://search.brave.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
            view.style.display = 'block';
        }

        function closePortal() {
            view.style.display = 'none';
            frame.src = 'about:blank';
        }

        input.onkeydown = (e) => { if (e.key === 'Enter') blastOff(input.value); };
    </script>
</body>
</html>
